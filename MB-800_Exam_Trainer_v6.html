<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB-800 Exam Trainer v6 — Business Central</title>
<style>
  :root {
    --bg: #09090b; --surface: #18181b; --surface2: #27272a; --border: #3f3f46;
    --text: #f4f4f5; --text2: #a1a1aa; --text3: #71717a;
    --amber: #fbbf24; --amber-dim: rgba(251,191,36,.1); --amber-border: rgba(251,191,36,.3);
    --green: #34d399; --green-dim: rgba(52,211,153,.1); --green-border: rgba(52,211,153,.4);
    --red: #f87171; --red-dim: rgba(248,113,113,.1); --red-border: rgba(248,113,113,.4);
    --blue: #60a5fa; --blue-dim: rgba(96,165,250,.1); --blue-border: rgba(96,165,250,.3);
    --purple: #c084fc; --purple-dim: rgba(192,132,252,.1); --purple-border: rgba(192,132,252,.3);
    --teal: #2dd4bf; --teal-dim: rgba(45,212,191,.1); --teal-border: rgba(45,212,191,.3);
    --orange: #fb923c; --orange-dim: rgba(251,146,60,.1); --orange-border: rgba(251,146,60,.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','SF Pro Display',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .container { max-width:720px; margin:0 auto; padding:16px; }
  @media(min-width:768px) { .container { padding:32px; } }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; justify-content:center; padding:12px 24px; border-radius:12px; font-weight:600; font-size:15px; border:none; cursor:pointer; transition:all .15s; }
  .btn:active { transform:scale(.98); }
  .btn-primary { background:var(--amber); color:#09090b; }
  .btn-primary:hover { background:#fcd34d; }
  .btn-primary:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; transform:none; }
  .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--surface2); }
  .btn-full { width:100%; }

  /* Badge */
  .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:6px; font-size:12px; font-weight:500; cursor:default; }
  .badge-topic { background:var(--surface); color:var(--text3); border:1px solid var(--border); }
  .badge-single { background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue-border); }
  .badge-multi { background:var(--purple-dim); color:var(--purple); border:1px solid var(--purple-border); }
  .badge-ordering { background:var(--teal-dim); color:var(--teal); border:1px solid var(--teal-border); }
  .badge-matching { background:var(--orange-dim); color:var(--orange); border:1px solid var(--orange-border); }
  .badge-cert { background:var(--amber-dim); color:var(--amber); border:1px solid var(--amber-border); padding:4px 14px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; border-radius:999px; }
  .badge-filter { cursor:pointer; transition:all .15s; }
  .badge-filter:hover { opacity:.8; }
  .badge-filter.active { box-shadow:0 0 0 2px var(--amber); }

  /* Topic grid */
  .topic-grid { display:grid; grid-template-columns:1fr; gap:8px; }
  @media(min-width:500px) { .topic-grid { grid-template-columns:1fr 1fr; } }
  .topic-btn { text-align:left; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--surface); cursor:pointer; transition:all .15s; }
  .topic-btn:hover { border-color:var(--text3); }
  .topic-btn.active { border-color:var(--amber-border); background:var(--amber-dim); }
  .topic-btn .name { font-size:14px; font-weight:500; color:var(--text2); }
  .topic-btn.active .name { color:var(--amber); }
  .topic-btn .sub { font-size:12px; color:var(--text3); margin-top:2px; }
  .topic-btn .count { font-size:11px; padding:1px 6px; border-radius:4px; background:var(--surface2); color:var(--text3); }
  .topic-btn.active .count { background:var(--amber-dim); color:var(--amber); }
  .topic-row { display:flex; justify-content:space-between; align-items:center; }

  /* Settings */
  .settings { padding:16px; border-radius:12px; border:1px solid var(--border); background:rgba(24,24,27,.5); margin-bottom:24px; }
  .settings label { display:flex; align-items:center; gap:10px; cursor:pointer; font-size:14px; color:var(--text2); margin-bottom:8px; }
  .settings label:last-child { margin-bottom:0; }
  .settings input[type=checkbox] { accent-color:var(--amber); width:16px; height:16px; }
  .settings select { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:14px; color:var(--text); }

  /* Start grid */
  .start-grid { display:grid; grid-template-columns:1fr; gap:12px; }
  @media(min-width:500px) { .start-grid { grid-template-columns:1fr 1fr; } }
  .start-btn { padding:16px 24px; border-radius:12px; border:none; cursor:pointer; text-align:center; transition:all .15s; }
  .start-btn:active { transform:scale(.98); }
  .start-btn.practice { background:var(--amber); color:#09090b; }
  .start-btn.practice:hover { background:#fcd34d; }
  .start-btn.exam { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .start-btn.exam:hover { background:var(--surface2); }
  .start-btn .title { font-size:16px; font-weight:700; }
  .start-btn .desc { font-size:12px; margin-top:4px; opacity:.7; }

  /* Progress bar */
  .progress-track { width:100%; height:6px; background:var(--surface2); border-radius:999px; overflow:hidden; margin-bottom:20px; }
  .progress-fill { height:100%; background:var(--amber); border-radius:999px; transition:width .3s; }
  .progress-fill.result { transition:width 1s; }

  /* Option button */
  .option { width:100%; text-align:left; padding:14px 16px; border-radius:12px; border:2px solid var(--border); background:#1e1e22; cursor:pointer; transition:all .2s; margin-bottom:10px; display:flex; align-items:flex-start; gap:12px; }
  .option:hover:not(.locked) { border-color:#71717a; background:#2a2a30; }
  .option.selected { border-color:var(--amber); background:rgba(251,191,36,.12); }
  .option.selected .option-text { color:#fff; }
  .option.correct { border-color:var(--green); background:rgba(52,211,153,.12); }
  .option.correct .option-text { color:#fff; }
  .option.wrong { border-color:var(--red); background:rgba(248,113,113,.12); }
  .option.wrong .option-text { color:#fff; }
  .option.dimmed { border-color:rgba(63,63,70,.4); background:rgba(24,24,27,.3); opacity:.45; }
  .option.locked { cursor:default; }
  .option-letter { flex-shrink:0; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:#333; color:#a1a1aa; }
  .option.selected .option-letter { background:var(--amber); color:#09090b; }
  .option.correct .option-letter { background:var(--green); color:#09090b; }
  .option.wrong .option-letter { background:var(--red); color:#09090b; }
  .option-text { font-size:14px; line-height:1.5; padding-top:3px; color:#e4e4e7; }

  /* Ordering styles */
  .ordering-item { width:100%; text-align:left; padding:14px 16px; border-radius:12px; border:2px solid var(--border); background:#1e1e22; margin-bottom:8px; display:flex; align-items:center; gap:12px; transition:all .2s; user-select:none; }
  .ordering-item:not(.locked) { cursor:grab; }
  .ordering-item:not(.locked):hover { border-color:#71717a; background:#2a2a30; }
  .ordering-item:not(.locked):active { cursor:grabbing; }
  .ordering-item.dragging { opacity:.5; border-color:var(--amber); }
  .ordering-item.drag-over { border-color:var(--amber); border-style:dashed; }
  .ordering-item.correct { border-color:var(--green); background:rgba(52,211,153,.12); }
  .ordering-item.wrong { border-color:var(--red); background:rgba(248,113,113,.12); }
  .ordering-item.locked { cursor:default; }
  .ordering-num { flex-shrink:0; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:#333; color:#a1a1aa; }
  .ordering-item.correct .ordering-num { background:var(--green); color:#09090b; }
  .ordering-item.wrong .ordering-num { background:var(--red); color:#09090b; }
  .ordering-text { font-size:14px; line-height:1.5; color:#e4e4e7; flex:1; }
  .drag-handle { color:var(--text3); font-size:16px; flex-shrink:0; }
  .ordering-arrows { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  .ordering-arrows button { background:none; border:1px solid var(--border); border-radius:4px; width:24px; height:20px; cursor:pointer; color:var(--text3); font-size:10px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .ordering-arrows button:hover { border-color:var(--amber); color:var(--amber); background:var(--amber-dim); }

  /* Matching styles */
  .match-item { padding:12px 16px; border-radius:10px; border:1px solid var(--border); background:#1e1e22; margin-bottom:6px; font-size:14px; line-height:1.5; color:#e4e4e7; }
  .match-item.correct { border-color:var(--green); background:rgba(52,211,153,.08); }
  .match-item.wrong { border-color:var(--red); background:rgba(248,113,113,.08); }

  /* Explanation box */
  .explain { padding:16px; border-radius:12px; margin-bottom:20px; }
  .explain.pass { border:1px solid var(--green-border); background:var(--green-dim); }
  .explain.fail { border:1px solid var(--red-border); background:var(--red-dim); }
  .explain-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:14px; font-weight:600; }
  .explain-body { font-size:14px; color:var(--text2); line-height:1.6; }

  /* Top bar */
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:14px; }
  .topbar-quit { color:var(--text3); background:none; border:none; cursor:pointer; font-size:14px; }
  .topbar-quit:hover { color:var(--text); }
  .topbar-score { font-weight:600; }
  .topbar-score.good { color:var(--green); }
  .topbar-score.mid { color:var(--amber); }

  /* Timer */
  .timer { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:8px; background:var(--surface2); font-size:13px; font-weight:600; color:var(--text2); }
  .timer.warning { color:var(--red); background:var(--red-dim); }

  /* Review */
  .review-item { padding:12px; border-radius:10px; margin-bottom:8px; display:flex; align-items:flex-start; gap:8px; cursor:pointer; transition:all .15s; }
  .review-item:hover { opacity:.85; }
  .review-item.pass { border:1px solid rgba(52,211,153,.2); background:rgba(52,211,153,.04); }
  .review-item.fail { border:1px solid rgba(248,113,113,.2); background:rgba(248,113,113,.04); }
  .review-text { font-size:13px; color:var(--text2); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .review-answers { font-size:12px; margin-top:4px; }
  .review-detail { padding:16px; border-radius:12px; border:1px solid var(--border); background:var(--surface); margin-bottom:16px; }
  .review-detail h3 { font-size:15px; margin-bottom:12px; color:var(--text); }

  /* Stats */
  .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:24px; }
  @media(min-width:500px) { .stat-grid { grid-template-columns:repeat(4,1fr); } }
  .stat-card { padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--surface); text-align:center; }
  .stat-val { font-size:24px; font-weight:700; }
  .stat-label { font-size:11px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:.05em; }

  /* Utilities */
  .text-center { text-align:center; }
  .mb-2 { margin-bottom:8px; }
  .mb-3 { margin-bottom:12px; }
  .mb-4 { margin-bottom:16px; }
  .mb-6 { margin-bottom:24px; }
  .mb-8 { margin-bottom:32px; }
  .mb-10 { margin-bottom:40px; }
  .flex-center { display:flex; align-items:center; justify-content:center; }
  .gap-2 { gap:8px; }
  .gap-3 { gap:12px; }
  h1 { font-size:2.2rem; font-weight:700; letter-spacing:-.02em; }
  h1 .accent { color:var(--amber); }
  .subtitle { color:var(--text3); font-size:14px; }
  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .filter-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .section-title { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }

  /* Login */
  .login-wrap { max-width:400px; margin:0 auto; }
  .login-title { font-size:1.6rem; font-weight:700; text-align:center; margin-bottom:8px; }
  .login-sub { font-size:14px; color:var(--text3); text-align:center; margin-bottom:24px; }
  .user-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .user-btn { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px; border:2px solid var(--border); background:#1e1e22; cursor:pointer; transition:all .15s; text-align:left; width:100%; color:var(--text); font-size:15px; }
  .user-btn:hover { border-color:var(--amber-border); background:var(--amber-dim); }
  .user-avatar { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; background:var(--surface2); color:var(--text3); flex-shrink:0; }
  .user-btn:hover .user-avatar { background:var(--amber); color:#09090b; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-weight:600; }
  .user-stats-line { font-size:12px; color:var(--text3); margin-top:2px; }
  .new-user-row { display:flex; gap:8px; }
  .new-user-input { flex:1; padding:12px 16px; border-radius:12px; border:2px solid var(--border); background:#1e1e22; color:var(--text); font-size:15px; outline:none; transition:border-color .15s; }
  .new-user-input:focus { border-color:var(--amber); }
  .new-user-input::placeholder { color:var(--text3); }
  .delete-user { background:none; border:none; color:var(--text3); cursor:pointer; font-size:16px; padding:4px 8px; border-radius:6px; transition:all .15s; }
  .delete-user:hover { color:var(--red); background:var(--red-dim); }

  /* Smart modes */
  .smart-grid { display:grid; grid-template-columns:1fr; gap:8px; }
  @media(min-width:500px) { .smart-grid { grid-template-columns:1fr 1fr; } }
  .smart-btn { text-align:left; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:var(--surface); cursor:pointer; transition:all .15s; }
  .smart-btn:hover { border-color:var(--amber-border); background:var(--amber-dim); }
  .smart-btn .s-icon { font-size:20px; margin-bottom:4px; }
  .smart-btn .s-title { font-size:14px; font-weight:600; color:var(--text); }
  .smart-btn .s-desc { font-size:12px; color:var(--text3); margin-top:2px; }
  .smart-btn.disabled { opacity:.4; cursor:not-allowed; }
  .smart-btn.disabled:hover { border-color:var(--border); background:var(--surface); }

  /* Explain links */
  .explain-links { margin-top:10px; padding-top:10px; border-top:1px solid rgba(255,255,255,.15); display:flex; flex-wrap:wrap; gap:8px; }
  .explain-links a, a.explain-links-a { display:inline-flex; align-items:center; gap:4px; color:#60a5fa; font-size:13px; font-weight:600; text-decoration:none; padding:5px 12px; border-radius:8px; background:rgba(96,165,250,.1); border:1px solid rgba(96,165,250,.25); transition:all .15s; }
  .explain-links a:hover, a.explain-links-a:hover { background:rgba(96,165,250,.2); border-color:rgba(96,165,250,.5); color:#93bbfc; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const Q=[
{id:1,topic:"Topic 1",num:2,type:"single",text:"A company uses Dynamics 365 Business Central. When users create sales documents, the system must display an alert that shows the customer's remaining credit. The alert must also notify the user if the customer has any overdue payments. You need to configure a credit limit and overdue payment warning. What should you do?",options:[{l:"A",t:"Configure the Block Customer field."},{l:"B",t:"Configure the Late Payment Predict extension."},{l:"C",t:"Select Both Warnings in the Credit Warnings field."},{l:"D",t:"Enable the Exact Cost Reversing Mandatory field."}],answer:["C"],explain:"The Credit Warnings field on the Sales & Receivables Setup page can be set to 'Both Warnings' to show both credit limit and overdue balance warnings when creating sales documents.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-setup-sales target=_blank class=explain-links-a>Sales Setup ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:2,topic:"Topic 1",num:3,type:"single",text:"You configure a cloud-based printer in Dynamics 365 Business Central. Purchase orders printed by users must automatically print to the cloud-based printer. You need to create a setup record for the user, report, and printer combination. On which page should you create the setup record?",options:[{l:"A",t:"Printer Selections"},{l:"B",t:"Printer Management"},{l:"C",t:"Report Layout Selection"},{l:"D",t:"Report Selection – Purchase"},{l:"E",t:"Document Sending Profiles"}],answer:["A"],explain:"The Printer Selections page is used to define which printer is used for specific reports and users.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-specify-printer-selection-reports target=_blank class=explain-links-a>Printer Setup ↗</a></div>"},
{id:3,topic:"Topic 1",num:4,type:"single",text:"You are implementing Dynamics 365 Business Central Online. Users must be added to Business Central for the first time. You need to add the users. Which action should you use?",options:[{l:"A",t:"Get New Users from Microsoft 365"},{l:"B",t:"Create a new entry on the User Setup page"},{l:"C",t:"Update Users from Microsoft 365"},{l:"D",t:"Import User Groups"}],answer:["C"],explain:"In current BC versions, 'Update Users from Microsoft 365' is the action to import users (both new and existing). The former 'Get New Users' action has been consolidated into this single action. Microsoft Learn confirms this is the ideal approach when setting up BC for the first time.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-how-users-permissions target=_blank class=explain-links-a>User Management ↗</a></div>"},
{id:4,topic:"Topic 1",num:7,type:"single",text:"A company uses Dynamics 365 Business Central. The company wants to print financial statements by using a cloud-based printer. You need to recommend the type of printer the customer should install. Which type of printer should you recommend?",options:[{l:"A",t:"Email"},{l:"B",t:"System"},{l:"C",t:"Client default"},{l:"D",t:"Server default"}],answer:["A"],explain:"For cloud-based printing in BC Online, the Email printer type is used as it allows sending print jobs to cloud printers via email integration.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-specify-printer-selection-reports target=_blank class=explain-links-a>Printer Setup ↗</a></div>"},
{id:5,topic:"Topic 1",num:8,type:"multi",text:"You create a test instance of Dynamics 365 Business Central and enter transactions for testing purposes. You create a production company instance in the same BC environment. You need to copy the setup and master data from the test instance to the production instance without copying transaction data. What are two possible ways to achieve the goal?",options:[{l:"A",t:"Use the Run Migration Now function from Cloud Migration Management"},{l:"B",t:"Create and export a configuration package from the source company. Next, import into the destination company"},{l:"C",t:"Use the Copy Data from Company function from the Configuration Worksheet page"},{l:"D",t:"Use the Copy function from the Companies page"}],answer:["B","C"],explain:"Configuration packages allow selective export/import of setup and master data. The Copy Data from Company function on the Configuration Worksheet also allows copying specific data tables between companies.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-set-up-a-company-with-rapidstart target=_blank class=explain-links-a>RapidStart ↗</a></div>"},
{id:6,topic:"Topic 1",num:10,type:"multi",text:"You are implementing Dynamics 365 Business Central for a customer. The customer wants to upload starting entries for all master data through a general journal on the last day of the current month. Which three functions should you select?",options:[{l:"A",t:"Vendors Opening balance"},{l:"B",t:"G/L Accounts Opening balance"},{l:"C",t:"Calculate Inventory"},{l:"D",t:"Get Standard Journals"},{l:"E",t:"Customers Opening balance"}],answer:["A","B","E"],explain:"To upload starting entries for master data, you need Vendors Opening balance, G/L Accounts Opening balance, and Customers Opening balance functions in the general journal.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:7,topic:"Topic 1",num:11,type:"single",text:"You are setting up and testing a workflow with approval hierarchy in Dynamics 365 Business Central. You configure the approver limit type Approver Chain. User1 creates a purchase order for $1,100. Which set of actions occurs?",options:[{l:"A",t:"User4 will receive an approval request. Once approved, the purchase order is released."},{l:"B",t:"User3 receives an approval request. Once User3 approves, the purchase order is released."},{l:"C",t:"User2 receives an approval request. Once approved, User3 receives one. Once both approve, the PO is released."},{l:"D",t:"User1 receives an approval request. Then User2, then User3 must each approve."},{l:"E",t:"User3 receives a request. Once approved, it goes to User4. Once both approve, the PO is released."}],answer:["C"],explain:"With Approver Chain, the request goes up the chain. User1's approver is User2. If User2's limit is below $1,100, it continues to User3. Both must approve before release.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/across-set-up-workflows target=_blank class=explain-links-a>Workflows ↗</a></div>"},
{id:8,topic:"Topic 1",num:13,type:"single",text:"A customer has premium licenses for Dynamics 365 Business Central. You need to make all actions and fields for Manufacturing and Service modules available. What should you do?",options:[{l:"A",t:"Assign users to the D365 BUS FULL ACCESS user group."},{l:"B",t:"Select the Premium option in the Experience field on the Company Information page."},{l:"C",t:"Assign SUPER permission sets to users."},{l:"D",t:"Assign users to the D365 BUS PREMIUM user group."},{l:"E",t:"Select the Custom option for the Company Badge field."}],answer:["B"],explain:"The Experience field on the Company Information page controls which modules are visible. Setting it to Premium enables Manufacturing and Service modules.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-company-information target=_blank class=explain-links-a>Company Info ↗</a></div>"},
{id:9,topic:"Topic 1",num:16,type:"multi",text:"You need to demonstrate different options for assigning profiles to users. In which three places can you assign profiles?",options:[{l:"A",t:"Assign a User Group to the user. Assign the Profile to the User Group."},{l:"B",t:"Assign a Profile on the User Personalization page."},{l:"C",t:"Assign the Profile on the User card."},{l:"D",t:"Accept the default Profile."},{l:"E",t:"Add the user to the Profile card."}],answer:["A","B","D"],explain:"Profiles can be assigned via User Groups, User Personalization page, or by accepting the default profile.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:10,topic:"Topic 1",num:17,type:"multi",text:"A customer wants to send quotes and invoices by email from Business Central. What are two possible ways to configure outbound email?",options:[{l:"A",t:"Configure SMTP Mail Setup options."},{l:"B",t:"Run the Set up your Business Inbox in Outlook assisted setup tool."},{l:"C",t:"Run the Set up email logging assisted setup tool."},{l:"D",t:"Run the Email setup assisted setup tool."}],answer:["A","D"],explain:"Outbound email can be configured via SMTP Mail Setup or the Email setup assisted setup tool.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-how-setup-email target=_blank class=explain-links-a>Email Setup ↗</a></div>"},
{id:11,topic:"Topic 1",num:18,type:"single",text:"You must create a unique number series for payments from a specific vendor. No other vendors will use it. What should you use?",options:[{l:"A",t:"Vendors"},{l:"B",t:"General Journals"},{l:"C",t:"General Journal template"},{l:"D",t:"Payment journals"},{l:"E",t:"Workflow"}],answer:["B"],explain:"General Journal Batches (within General Journals) can have their own No. Series, allowing unique number series per batch.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-create-number-series target=_blank class=explain-links-a>Number Series ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:12,topic:"Topic 1",num:20,type:"multi",text:"You create a role center page for all users. Users must not be allowed to personalize the page. Which three actions should you perform?",options:[{l:"A",t:"On Profiles (Role) page, select the User as default profile option."},{l:"B",t:"On the User card, set status to Disabled."},{l:"C",t:"On Profiles (Role) page, select Show in Role Explorer column."},{l:"D",t:"On Profiles (Role) page, Enable the profile. Disable all other profiles."},{l:"E",t:"On Profiles (Role) page, select Disable Personalization option."}],answer:["A","D","E"],explain:"You need to enable the profile, set it as default, and disable personalization.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:13,topic:"Topic 1",num:23,type:"multi",text:"You want to migrate historical financial information including analytical info using a configuration package. Which three steps should you use?",options:[{l:"A",t:"Create a configuration package. Then select the appropriate table."},{l:"B",t:"Export to Excel. Adjust to include dimension info. Import updated Excel."},{l:"C",t:"Select Dimensions as Columns. Include all dimension fields in the config package."},{l:"D",t:"Export the configuration package."},{l:"E",t:"Assign a data template to the configuration package."}],answer:["A","C","D"],explain:"Create a config package with the right table, use 'Dimensions as Columns' to include analytical info, and export.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:14,topic:"Topic 1",num:24,type:"multi",text:"You import data into a General Journal batch with Force Doc. Balance enabled. You get 'Out of balance' error. Which three actions should you perform?",options:[{l:"A",t:"Ensure lines balance by posting date."},{l:"B",t:"Ensure lines balance by gen. posting type."},{l:"C",t:"Ensure lines balance by amount."},{l:"D",t:"Ensure lines balance by document no."},{l:"E",t:"Ensure lines balance by dimension set ID."}],answer:["A","C","D"],explain:"With Force Doc. Balance, lines must balance by document number, posting date, and amount (debit = credit)."},
{id:15,topic:"Topic 1",num:26,type:"single",text:"Solution: On the Report Selection – Service page, set Usage to Order. Update the Report ID. Does this configure the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"The Report Selection – Service page is for service documents, not purchase documents."},
{id:16,topic:"Topic 1",num:27,type:"single",text:"Solution: On the Report Selection – Purchase page, set Usage to Order. Update the Report ID. Does this configure the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"Report Selection – Purchase with Usage = Order is the correct location for the default purchase order report.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a></div>"},
{id:17,topic:"Topic 1",num:28,type:"single",text:"Solution: On the Custom Report Layouts page, create a new custom layout. Does this configure the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Custom Report Layouts changes the layout of an existing report, not which report object is used as default."},
{id:18,topic:"Topic 1",num:36,type:"single",text:"Solution: On the Report Layout Selection page, set the Report ID to the new report. Does this configure the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Report Layout Selection only changes which layout to use for a report, not which report object is the default."},
{id:19,topic:"Topic 1",num:43,type:"single",text:"The finance manager creates a new G/L account. You need to include it in the general journal reconciliation window. What should you do?",options:[{l:"A",t:"Add this G/L account to the Bank Account Posting Group."},{l:"B",t:"Enable the Direct Posting field."},{l:"C",t:"Enable the Reconciliation Account field."},{l:"D",t:"Create a new payment reconciliation journal."}],answer:["C"],explain:"The Reconciliation Account field on the G/L account card makes it appear in the reconciliation window.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:20,topic:"Topic 1",num:44,type:"single",text:"Base unit = PCS, additional unit = BOX. One BOX = 20 PCS. How to define the relationship?",options:[{l:"A",t:"BOX: Qty. per Unit of Measure = 0.05"},{l:"B",t:"BOX: Qty. per Unit of Measure = 20"},{l:"C",t:"PCS: Qty. per Unit of Measure = 0.05"},{l:"D",t:"PCS: Qty. per Unit of Measure = 20"}],answer:["B"],explain:"BOX Qty. per Unit of Measure = 20 means 1 BOX = 20 PCS (base unit). Base unit always = 1."},
{id:21,topic:"Topic 1",num:47,type:"multi",text:"A company plans to use multiple unit prices from different vendors. In which two locations can you configure purchase prices?",options:[{l:"A",t:"Purchase order"},{l:"B",t:"Resource prices"},{l:"C",t:"Vendor card"},{l:"D",t:"Customer card"},{l:"E",t:"Item card"}],answer:["C","E"],explain:"Purchase prices can be configured on the Vendor card and on the Item card.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/inventory-how-register-new-items target=_blank class=explain-links-a>Items ↗</a></div>"},
{id:22,topic:"Topic 1",num:54,type:"single",text:"You assign permission sets with conflicting permissions (Yes and Blank). What is the outcome?",options:[{l:"A",t:"The Yes option will allow a user to create a new customer."},{l:"B",t:"The permission set order will determine access."},{l:"C",t:"The Blank option will allow a user to create a new customer."}],answer:["A"],explain:"Permissions are additive. If any set grants 'Yes', the user has that permission regardless of 'Blank' in another set."},
{id:23,topic:"Topic 1",num:55,type:"single",text:"Solution: Add the report extension to the Report Selection – Purchase page. Does this add new data items and change the layout?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"A report extension extends an existing report; it doesn't get added to Report Selection as a separate report.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-extensions target=_blank class=explain-links-a>Extensions ↗</a></div>"},
{id:24,topic:"Topic 1",num:56,type:"single",text:"Solution: Use Custom Report Layouts and create a new custom layout for the standard report. Does this add new data items?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Custom Report Layouts can change layout but cannot add new data items."},
{id:25,topic:"Topic 1",num:57,type:"single",text:"Solution: Use a report extension object and add a new column on the custom report layout. Does this add new data items and change layout?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"A report extension can add new data items, combined with a custom layout this meets the requirement.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-extensions target=_blank class=explain-links-a>Extensions ↗</a></div>"},
{id:26,topic:"Topic 1",num:59,type:"single",text:"Solution: On the Report Layout Selection page, change the layout to a Word Layout. Does this add new data items?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Changing layout type doesn't add new data items. That requires code changes."},
{id:27,topic:"Topic 1",num:60,type:"single",text:"The finance manager must search for contacts and share BC records in Teams. What should you do first?",options:[{l:"A",t:"Select Share action on Attachment Documents in BC."},{l:"B",t:"Search for Teams App Centralized Deployment in BC."},{l:"C",t:"Add a Planner tab to a team channel."},{l:"D",t:"Manage apps in the BC admin center."}],answer:["B"],explain:"Teams App Centralized Deployment in BC deploys the BC app to Teams for the organization."},
{id:28,topic:"Topic 1",num:64,type:"single",text:"Solution: On Document Sending Profile page, configure to use a custom report. Does this set the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Document Sending Profiles control how documents are sent, not which report object is default.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:29,topic:"Topic 1",num:66,type:"multi",text:"Case study: The purchasing manager needs an approval system with email notifications. Which two actions should you take?",options:[{l:"A",t:"Create a purchase order approval workflow."},{l:"B",t:"Use Business Central as the engine."},{l:"C",t:"Use Power Automate as the engine."},{l:"D",t:"Create a purchase invoice approval workflow."}],answer:["A","C"],explain:"A purchase order approval workflow with Power Automate as engine handles email notifications natively.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/across-set-up-workflows target=_blank class=explain-links-a>Workflows ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a></div>"},
{id:30,topic:"Topic 1",num:68,type:"single",text:"Items sold in boxes and pallets as pieces. Box=12, Pallet=144 pieces. How to assign UoM?",options:[{l:"A",t:"Box as base. Pieces as UoM with qty=0.08333."},{l:"B",t:"Pallet as base. Pieces as UoM with qty=0.0069."},{l:"C",t:"Pallet as base. Box as UoM with qty=0.08333."},{l:"D",t:"Pieces as base. Pallet as UoM with qty=144."}],answer:["D"],explain:"Pieces (smallest) as base. Pallet = 144 Qty. per Unit of Measure."},
{id:31,topic:"Topic 1",num:69,type:"single",text:"Solution: On Report Selection – Warehouse page, set Usage to Purchase Order. Does this set the default purchase order report?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Report Selection – Warehouse is for warehouse documents, not purchase orders.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:32,topic:"Topic 1",num:70,type:"multi",text:"Customer wants to send quotes/invoices by email from BC. What are two ways to configure outbound email?",options:[{l:"A",t:"Run Set up your Business Inbox in Outlook."},{l:"B",t:"Run Email setup assisted setup tool."},{l:"C",t:"Run Set up email logging assisted setup."},{l:"D",t:"Configure Email Accounts options."}],answer:["B","D"],explain:"Email setup assisted setup and Email Accounts are the two ways to configure outbound email in modern BC.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-how-setup-email target=_blank class=explain-links-a>Email Setup ↗</a></div>"},
{id:33,topic:"Topic 1",num:72,type:"multi",text:"The company requires tracking user logins. Which two actions should you perform?",options:[{l:"A",t:"Configure User Setup."},{l:"B",t:"Enable time registration in GL setup."},{l:"C",t:"Manage Sessions page in admin center."},{l:"D",t:"Access User Time Register page."}],answer:["A","D"],explain:"User Setup and User Time Register page work together to track user login activity."},
{id:34,topic:"Topic 1",num:73,type:"single",text:"Items in boxes/pallets as pieces. Box=12, Pallet=144 pieces. How to assign UoM?",options:[{l:"A",t:"Boxes as item UoM with qty=1."},{l:"B",t:"Pieces as base. Box as UoM with qty=12."},{l:"C",t:"Pallet as base. Pieces as UoM with qty=0.0069."},{l:"D",t:"Box as base. Pallet as UoM with qty=12."}],answer:["B"],explain:"Pieces as base unit. Box = 12 Qty. per Unit of Measure."},
{id:35,topic:"Topic 2",num:1,type:"single",text:"You must import payments from a bank and auto-match against ledger entries. Which tool?",options:[{l:"A",t:"Payment services"},{l:"B",t:"Payment Application Rules"},{l:"C",t:"Payment Reconciliation Journal"},{l:"D",t:"Payment Registration"}],answer:["C"],explain:"Payment Reconciliation Journal imports bank statements and auto-matches payments to open entries.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/bank-how-reconcile-bank-accounts-separately target=_blank class=explain-links-a>Bank Reconciliation ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/receivables-how-map-text-recurring-payments-accounts-auto-reconcilliation target=_blank class=explain-links-a>Payment Matching ↗</a></div>"},
{id:36,topic:"Topic 2",num:3,type:"single",text:"Vendor payments on the 7th of next month. Which date formula?",options:[{l:"A",t:"37D"},{l:"B",t:"1M+7D"},{l:"C",t:"1M+6D"},{l:"D",t:"CM+7D"}],answer:["D"],explain:"CM+7D = Current Month end + 7 Days = 7th of the next month."},
{id:37,topic:"Topic 2",num:4,type:"single",text:"Cash vendor: payments must post automatically with purchase invoice. What to use?",options:[{l:"A",t:"Payment Method as Cash"},{l:"B",t:"Payment Term as COD"},{l:"C",t:"Payment Method as Cash with balancing account"},{l:"D",t:"Prepayment"}],answer:["C"],explain:"Payment Method Cash with balancing account auto-creates the payment entry when posting the invoice."},
{id:38,topic:"Topic 2",num:6,type:"single",text:"Monetary amounts must display three decimal places. Which field in GL Setup?",options:[{l:"A",t:"Amount Decimal Places to 3:3"},{l:"B",t:"Unit-Amount Decimal Places to 3:3"},{l:"C",t:"Inv. Rounding Precision to 0.001"},{l:"D",t:"Unit-Amount Rounding Precision to 0.001"},{l:"E",t:"Amount Rounding Precision to 0.001"}],answer:["A"],explain:"Amount Decimal Places 3:3 forces exactly 3 decimal places for all amounts."},
{id:39,topic:"Topic 2",num:8,type:"single",text:"Check G/L Account Usage is enabled. What must be true to delete an account?",options:[{l:"A",t:"Cannot be used in any posting groups or posting setup"},{l:"B",t:"Cannot be used in any account schedule."},{l:"C",t:"Cannot allow direct posting."},{l:"D",t:"Must have ledger entries."}],answer:["A"],explain:"The system prevents deletion of accounts used in posting groups or posting setup.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a></div>"},
{id:40,topic:"Topic 2",num:9,type:"single",text:"G/L accounts receivable must match sum of customer balances. How to set up?",options:[{l:"A",t:"Configure the account type."},{l:"B",t:"Block the account."},{l:"C",t:"Configure totaling."},{l:"D",t:"Disallow direct posting."}],answer:["D"],explain:"Disabling direct posting ensures all postings go through customer ledger entries, keeping GL and subledger in sync.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:41,topic:"Topic 2",num:12,type:"multi",text:"Configure General Posting Setup efficiently. What are three ways?",options:[{l:"A",t:"Use Copy action to create new card"},{l:"B",t:"Import a configuration package"},{l:"C",t:"Use Suggest Accounts to create all combinations"},{l:"D",t:"Create new card, then use Suggest Accounts"},{l:"E",t:"Create new card, then use Copy action"}],answer:["B","C","D"],explain:"Import via config package, use Suggest Accounts, or create a card and then use Suggest Accounts."},
{id:42,topic:"Topic 2",num:14,type:"multi",text:"Monthly journal batches need unique sequential document numbers. Which two fields?",options:[{l:"A",t:"Template Batch with Posting No. Series."},{l:"B",t:"Create the No. Series."},{l:"C",t:"General Journal with Purchase Reason Code."},{l:"D",t:"General Journal Template with Purchase Type."},{l:"E",t:"Template Batch with No. Series."}],answer:["B","D"],explain:"Create a No. Series and configure a General Journal Template with Purchase Type.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-create-number-series target=_blank class=explain-links-a>Number Series ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:43,topic:"Topic 2",num:19,type:"single",text:"Where to define the Direct Cost Applied account?",options:[{l:"A",t:"Item Cards"},{l:"B",t:"Inventory Posting Setup"},{l:"C",t:"General Posting Setups"},{l:"D",t:"Vendor Posting Groups"}],answer:["C"],explain:"Direct Cost Applied is defined in General Posting Setup."},
{id:44,topic:"Topic 2",num:20,type:"single",text:"Vendor card configured for price verification. Validation error on purchase order. Which setting causes it?",options:[{l:"A",t:"Order address"},{l:"B",t:"Location code"},{l:"C",t:"Vendor Template"},{l:"D",t:"Purchase Prices"},{l:"E",t:"Vendor Posting Group"}],answer:["D"],explain:"Purchase Prices cause validation errors if order price doesn't match configured special price.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a></div>"},
{id:45,topic:"Topic 2",num:23,type:"multi",text:"Configure payment matching for highest confidence auto-match. Which three fields?",options:[{l:"A",t:"Statement amount"},{l:"B",t:"Account number"},{l:"C",t:"Related-party fields"},{l:"D",t:"Transaction date"},{l:"E",t:"Transaction text"}],answer:["A","C","E"],explain:"The three configurable matching criteria in Payment Application Rules are: Statement Amount (matched against open entry amounts), Related-Party fields (bank account, name, address matched against customer/vendor), and Transaction Text (matched against Document No./External Document No.). Transaction Date is only used internally as an additional filter, not as a standalone matching criterion.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/receivables-how-map-text-recurring-payments-accounts-auto-reconcilliation target=_blank class=explain-links-a>Payment Matching ↗</a></div>"},
{id:46,topic:"Topic 2",num:25,type:"single",text:"Which field calculates Due Date from Payment Terms?",options:[{l:"A",t:"Order Date"},{l:"B",t:"Due Date"},{l:"C",t:"Posting Date"},{l:"D",t:"Document Date"}],answer:["D"],explain:"Document Date is the base date for Payment Terms Due Date calculation.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-payment-terms target=_blank class=explain-links-a>Payment Terms ↗</a></div>"},
{id:47,topic:"Topic 2",num:26,type:"single",text:"Sales invoice amounts must be rounded. Where to configure for local currency?",options:[{l:"A",t:"Currency Card"},{l:"B",t:"General Ledger Setup"},{l:"C",t:"Sales & Receivable Setup"},{l:"D",t:"Currency Exchange Rates"}],answer:["B"],explain:"For local currency rounding, configure in General Ledger Setup.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-set-up-invoice-rounding target=_blank class=explain-links-a>Invoice Rounding ↗</a></div>"},
{id:48,topic:"Topic 2",num:27,type:"single",text:"Check G/L Account Usage enabled. What must be true to delete?",options:[{l:"A",t:"Cannot have a balance amount."},{l:"B",t:"Cannot be used in any account schedule."},{l:"C",t:"Configured to allow deletion."},{l:"D",t:"Must have ledger entries."}],answer:["A"],explain:"An account cannot be deleted if it has a balance."},
{id:49,topic:"Topic 2",num:28,type:"multi",text:"Three ways to create new customers?",options:[{l:"A",t:"Contacts page → Related Information → Customer."},{l:"B",t:"Contacts page → Create as Customer."},{l:"C",t:"Configuration Template Header → Create Instance."},{l:"D",t:"Customers page → New."},{l:"E",t:"Customer card → Apply Template."}],answer:["B","C","D"],explain:"Create from Contacts (Create as Customer), Configuration Templates (Create Instance), or Customers page (New)."},
{id:50,topic:"Topic 2",num:29,type:"single",text:"Create a G/L account as purchase account for general journal transactions. How?",options:[{l:"A",t:"Select Purchase as Gen. Posting Type."},{l:"B",t:"Assign general product posting group linked to purchase account."},{l:"C",t:"Link gen. business + product posting groups to purchase account."},{l:"D",t:"Assign general business posting group linked to purchase account."}],answer:["A"],explain:"Set Gen. Posting Type to Purchase on the G/L account for general journal use."},
{id:51,topic:"Topic 2",num:31,type:"multi",text:"Payment terms: due 30 days, 2% discount if paid within 10 days. Which three actions?",options:[{l:"A",t:"Discount Date Calculation = 2D"},{l:"B",t:"Discount Date Calculation = 10D"},{l:"C",t:"Discount % = 2"},{l:"D",t:"Due Date Calculation = 30D"},{l:"E",t:"Discount % = 10"}],answer:["B","C","D"],explain:"Due Date = 30D, Discount Date = 10D, Discount % = 2 creates '2/10 Net 30' terms."},
{id:52,topic:"Topic 2",num:32,type:"single",text:"Post vendor open balances directly via general journal. Which G/L setting?",options:[{l:"A",t:"Account Category"},{l:"B",t:"Income/Balance"},{l:"C",t:"Default Deferral template"},{l:"D",t:"Direct Posting"}],answer:["D"],explain:"Direct Posting must be enabled to allow posting through general journals."},
{id:53,topic:"Topic 2",num:33,type:"single",text:"Posted Sales Invoice has incorrect dimension. Update without new entries. Which option?",options:[{l:"A",t:"Correct Dimensions"},{l:"B",t:"Edit List"},{l:"C",t:"Edit In Excel"},{l:"D",t:"Reverse Transaction"}],answer:["A"],explain:"Correct Dimensions updates dimension values on posted entries without creating new entries."},

{id:115,topic:"Topic 4",num:27,type:"single",text:"Standard costing, post variance between actual and standard. Where?",options:[{l:"A",t:"Gen. Business Posting Groups"},{l:"B",t:"General Posting Setup"},{l:"C",t:"Vendor Posting Groups"},{l:"D",t:"Inventory Posting Groups"}],answer:["B"],explain:"General Posting Setup has the Purchase Variance Account."},
{id:116,topic:"Topic 4",num:30,type:"single",text:"Ensure on-time vendor payments for better price negotiations. What to do?",options:[{l:"A",t:"Priority=0, create workflow."},{l:"B",t:"Priority=1, enable Late Payment Predictions."},{l:"C",t:"Priority=1, run Suggest Vendor Payments."},{l:"D",t:"Apply to Oldest, Suggest Vendor Payments."},{l:"E",t:"Priority=0, Suggest Vendor Payments."}],answer:["C"],explain:"Priority=1 ensures vendor is prioritized in payment runs."},
{id:117,topic:"Topic 4",num:32,type:"multi",text:"Three primary purposes of Adjust Cost – Item Entries?",options:[{l:"A",t:"Establish earliest posting date for Post Inventory to G/L."},{l:"B",t:"Adjust item quantity."},{l:"C",t:"Calculate correct cost per costing method."},{l:"D",t:"Update COGS for historic sales."},{l:"E",t:"Adjust item tracking."}],answer:["A","C","D"],explain:"Calculates correct costs, updates COGS, establishes posting dates for Post Inventory to G/L."},
{id:118,topic:"Topic 4",num:33,type:"multi",text:"Invoice multiple shipments on one invoice. Two training methods?",options:[{l:"A",t:"Combine Shipments to create and post invoices/credit memos."},{l:"B",t:"Invoice for Bill-to Customer + Get Shipment Lines."},{l:"C",t:"Combine Shipments to create invoices and delete orders."},{l:"D",t:"Invoice for Sell-to Customer + Get Shipment Lines."},{l:"E",t:"Combine Shipments to create, post, and print."}],answer:["A","B"],explain:"Combine Shipments or manual invoice with Get Shipment Lines for Bill-to Customer.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:119,topic:"Topic 4",num:34,type:"multi",text:"Suggest Vendor Payments: pay 2 days before due date. Which two fields?",options:[{l:"A",t:"Find Payment Discounts"},{l:"B",t:"Calculate Posting Date from Applies-to-Doc Due Date"},{l:"C",t:"Applies-to-Doc Due Date Offset"},{l:"D",t:"Summarize per Vendor"}],answer:["B","C"],explain:"Calculate from Due Date + Offset of -2D.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-payment-terms target=_blank class=explain-links-a>Payment Terms ↗</a></div>"},
{id:120,topic:"Topic 4",num:35,type:"multi",text:"Manually reconcile customer/vendor payments. Which two pages?",options:[{l:"A",t:"Check Ledger Entries"},{l:"B",t:"Vendor Ledger Entries"},{l:"C",t:"Customer Ledger Entries"},{l:"D",t:"Bank Account Ledger Entries"}],answer:["B","C"],explain:"Vendor and Customer Ledger Entries for manual reconciliation."},
{id:121,topic:"Topic 4",num:40,type:"single",text:"Rule: no payment application if different currencies. Where to set up?",options:[{l:"A",t:"Sales & Receivables Setup"},{l:"B",t:"General Ledger Setup"},{l:"C",t:"Customer Card"},{l:"D",t:"Bank Account Card"},{l:"E",t:"Currencies"}],answer:["B"],explain:"Appln. between Currencies field in General Ledger Setup."},
{id:122,topic:"Topic 4",num:41,type:"single",text:"Reverse incorrect posted journal entry. Use Reverse Transaction. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"Reverse Transaction creates correcting entries."},
{id:123,topic:"Topic 4",num:42,type:"single",text:"Correct posted sales invoice. Use Correct function. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"Correct function creates credit memo and new invoice."},
{id:124,topic:"Topic 4",num:43,type:"single",text:"Reverse posted journal by deleting lines and re-entering. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Posted entries cannot be deleted. Use Reverse Transaction."},
{id:125,topic:"Topic 4",num:44,type:"single",text:"Set up transit location for transfers. What to configure?",options:[{l:"A",t:"Default Dimensions"},{l:"B",t:"Use as In-Transit"},{l:"C",t:"Cross-Dock Bin Code"},{l:"D",t:"Bins"}],answer:["B"],explain:"Use as In-Transit flag on Location card.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:126,topic:"Topic 4",num:47,type:"single",text:"Monthly accruals via Recurring General Journal with allocation. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"Recurring General Journals with allocation keys are correct for monthly accruals.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:127,topic:"Topic 4",num:48,type:"single",text:"Deferrals for prepaid expenses via Deferral Template. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"Deferral Templates automatically spread prepaid expenses.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-how-defer-revenue-expenses target=_blank class=explain-links-a>Deferrals ↗</a></div>"},
{id:128,topic:"Topic 4",num:49,type:"single",text:"Track fixed assets via Item card with type Inventory. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["B"],explain:"Fixed assets use Fixed Asset cards, not Item cards.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/fa-manage target=_blank class=explain-links-a>Fixed Assets ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/inventory-how-register-new-items target=_blank class=explain-links-a>Items ↗</a></div>"},
{id:129,topic:"Topic 4",num:50,type:"single",text:"Intercompany transactions via IC Partner codes and IC Chart of Accounts. Does this meet the goal?",options:[{l:"A",t:"Yes"},{l:"B",t:"No"}],answer:["A"],explain:"IC Partner codes and IC Chart of Accounts are required for intercompany.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:130,topic:"Topic 4",num:53,type:"single",text:"Control periods for deferral posting. Which page?",options:[{l:"A",t:"User tasks"},{l:"B",t:"User Card"},{l:"C",t:"User Setup"},{l:"D",t:"Deferral Template Card"}],answer:["C"],explain:"User Setup controls Allow Posting From/To date ranges."},
{id:131,topic:"Topic 4",num:55,type:"single",text:"Track AR and interest separately for parts vs equipment, same customer. What to configure?",options:[{l:"A",t:"Customer Card"},{l:"B",t:"Gen. Business Posting Group"},{l:"C",t:"Customer Posting Group"},{l:"D",t:"Sales & Receivable Setup"}],answer:["C"],explain:"Customer Posting Groups allow different receivables and interest G/L accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:132,topic:"Topic 5",num:3,type:"multi",text:"Company-specific config and restricted user access. Which two?",options:[{l:"A",t:"Responsibility center"},{l:"B",t:"Configuration worksheet"},{l:"C",t:"Configuration template"},{l:"D",t:"Permissions"}],answer:["A","D"],explain:"Responsibility centers for data scope, Permissions for action control."},
{id:133,topic:"Topic 6",num:2,type:"single",text:"Incorrect Salesperson-Region combinations need control. What to do?",options:[{l:"A",t:"Set Salesperson and Region dimensions to Limited."},{l:"B",t:"Assign Default Dimension Priorities."},{l:"C",t:"Block dimension combination."},{l:"D",t:"Add Default Dimensions on Customer Cards."}],answer:["A"],explain:"Limited dimension combinations restrict allowed value combinations.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:134,topic:"Topic 7",num:1,type:"single",text:"Cash and carry: payment posts automatically at sale. What to set up?",options:[{l:"A",t:"Payment Service"},{l:"B",t:"Direct Debit Mandate (OneOff)"},{l:"C",t:"Payment Method with Balance Account = Bank Account"},{l:"D",t:"Payment Terms with 0D"}],answer:["C"],explain:"Payment Method with balancing bank account auto-posts payment."},
{id:135,topic:"Topic 7",num:4,type:"multi",text:"Customers pay by 20th of next month. Which two actions?",options:[{l:"A",t:"Payment terms with CM+20D."},{l:"B",t:"Assign terms to customer price group."},{l:"C",t:"Assign terms to customer."},{l:"D",t:"Assign terms to customer posting group."},{l:"E",t:"Payment terms with D20."}],answer:["A","C"],explain:"CM+20D = 20th of next month. Assign to customer card."},
{id:136,topic:"Topic 8",num:4,type:"multi",text:"Auto-email invoices; pre-pay customers must NOT receive them. Which two?",options:[{l:"A",t:"Email = Yes (Default Settings)."},{l:"B",t:"Allow Sender Substitution."},{l:"C",t:"Email = Yes (Prompt for Settings)."},{l:"D",t:"Document Sending Profile with Email = No."},{l:"E",t:"Apply Office Server Settings."},{l:"F",t:"Document Sending Profile with Email = Yes."}],answer:["A","D"],explain:"Default Email = Yes for all, then override with Email = No profile for pre-pay customers.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:137,topic:"Topic 9",num:2,type:"single",text:"Case study pricing calculation. What is the unit price?",options:[{l:"A",t:"$15.30"},{l:"B",t:"$16.15"},{l:"C",t:"$17.00"},{l:"D",t:"$18.00"}],answer:["C"],explain:"Based on case study pricing rules, the unit price is $17.00."},
{id:138,topic:"Topic 10",num:1,type:"multi",text:"Set up UoM for items sold by case (10 each). Which two actions?",options:[{l:"A",t:"Case UoM Qty = 10."},{l:"B",t:"Qty per UoM = 1 in Item Units of Measure."},{l:"C",t:"Case UoM Qty = 1."},{l:"D",t:"Add Code and Description to Units of Measure table."}],answer:["A","D"],explain:"Add Case to UoM table, then set Qty per Unit of Measure = 10 on item."},
{id:139,topic:"Topic 11",num:1,type:"single",text:"Streamline accrual for items received but not invoiced. What to configure?",options:[{l:"A",t:"Default costing method: Standard"},{l:"B",t:"Automatic Cost Posting"},{l:"C",t:"Expected Cost Posting"},{l:"D",t:"Automatic Cost Adjustment: Always"}],answer:["C"],explain:"Expected Cost Posting creates accruals when items are received before invoicing."},
{id:140,topic:"Topic 11",num:3,type:"single",text:"Receive higher quantities of produce than ordered (spoilage allowance). What to configure?",options:[{l:"A",t:"Over-Receipt code with Tolerance %."},{l:"B",t:"Payment Tolerance %."},{l:"C",t:"Default Deferral template."},{l:"D",t:"Dampener Quantity > 0."}],answer:["A"],explain:"Over-Receipt codes with tolerance percentage allow receiving more than ordered."},
{id:141,topic:"Topic 12",num:1,type:"multi",text:"Invoice multiple shipments on one invoice. Which two methods?",options:[{l:"A",t:"Combine Shipments"},{l:"B",t:"Get Shipment Lines from Sales Order"},{l:"C",t:"Sales Order Shipping"},{l:"D",t:"Sales Order Invoicing"},{l:"E",t:"Get Shipment Lines from Sales Invoice"}],answer:["A","E"],explain:"Combine Shipments batch job or Get Shipment Lines from a Sales Invoice.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"}
,
{id:142,topic:"Topic 1",num:1,type:"ordering",text:"A company adds a user to Microsoft 365. Existing user groups do not have the required permission sets for newly added users. You need to assign a Dynamics 365 Business Central user group and permissions to the user and the company. Which five actions should you perform in sequence?",options:[{l:"1",t:"Navigate to the Users page in Business Central"},{l:"2",t:"Run \'Get New Users from Microsoft 365\'"},{l:"3",t:"Create a new User Group with required permissions"},{l:"4",t:"Assign permission sets to the User Group"},{l:"5",t:"Assign the User Group to the user"}],answer:["2","1","3","4","5"],explain:"First get users from M365, then navigate to Users page, create user group, assign permission sets to it, and finally assign the group to the user.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-define-granular-permissions target=_blank class=explain-links-a>Permissions ↗</a></div>"},
{id:143,topic:"Topic 1",num:5,type:"ordering",text:"You set up a new company for a customer. The customer provides you with a Microsoft Excel file that contains master data. You need to import the master data by using configuration packages. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create a new configuration package"},{l:"2",t:"Add tables to the configuration package"},{l:"3",t:"Export the package to Excel"},{l:"4",t:"Import the completed Excel file back into the package"},{l:"5",t:"Apply the package data"}],answer:["1","2","3","4","5"],explain:"Create package → Add tables → Export to Excel (to use as template) → Import completed Excel → Apply data."},
{id:144,topic:"Topic 1",num:6,type:"matching",text:"You are setting up approval workflows in Dynamics 365 Business Central. You need to configure approver limits. Match each approver limit type to the correct description.",options:[{l:"A",t:"Approver Chain → Each approver in the hierarchy must approve before escalating"},{l:"B",t:"Direct Approver → Only the direct approver defined in User Setup approves"},{l:"C",t:"First Qualified Approver → The first approver with sufficient limit approves"},{l:"D",t:"Specific Approver → A named approver is assigned regardless of hierarchy"}],answer:["A","B","C","D"],explain:"Approver Chain escalates through hierarchy. Direct Approver uses User Setup. First Qualified Approver finds the first person with sufficient authority. Specific Approver assigns a fixed person.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/across-set-up-workflows target=_blank class=explain-links-a>Workflows ↗</a></div>"},
{id:145,topic:"Topic 1",num:9,type:"matching",text:"You are creating companies for multiple customers in Dynamics 365 Business Central using the assisted setup guide. Match each company template to the correct scenario.",options:[{l:"A",t:"Production – No Data → New company with full setup but no sample data"},{l:"B",t:"Evaluation – Sample Data → Demo company with sample transactions for testing"},{l:"C",t:"Create New – No Data → Blank company with minimal setup"}],answer:["A","B","C"],explain:"Production – No Data provides a configured company ready for real data. Evaluation – Sample Data is for demos. Create New – No Data is a blank slate."},
{id:146,topic:"Topic 1",num:12,type:"ordering",text:"A company implements Dynamics 365 Business Central. The database contains very few posted entries. Global Dimension 1 is configured incorrectly. You need to run the Change Global Dimensions function in Sequential mode. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Change Global Dimensions page"},{l:"2",t:"Select the new dimension as Global Dimension 1"},{l:"3",t:"Select Sequential as the processing mode"},{l:"4",t:"Run the Start action to process the change"}],answer:["1","2","3","4"],explain:"Open the page, select the correct dimension, choose Sequential mode (for small databases), then start.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:147,topic:"Topic 1",num:14,type:"matching",text:"You manage several companies within one Dynamics 365 Business Central database. Most users work in only one company. Match each security setup to the correct requirement.",options:[{l:"A",t:"Permission Sets → Control what actions users can perform"},{l:"B",t:"User Groups → Group permissions for easier assignment"},{l:"C",t:"User Setup → Define company-specific settings per user"},{l:"D",t:"Allowed Companies → Restrict which companies users can access"}],answer:["A","B","C","D"],explain:"Permission Sets control actions, User Groups bundle permissions, User Setup configures per-user settings, Allowed Companies restricts company access.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-define-granular-permissions target=_blank class=explain-links-a>Permissions ↗</a></div>"},
{id:148,topic:"Topic 1",num:15,type:"matching",text:"The purchasing manager wants to implement an approval system by using email notifications. Match each setup to the correct action.",options:[{l:"A",t:"Power Automate → Configure email notification delivery"},{l:"B",t:"Approval User Setup → Define approver hierarchy and limits"},{l:"C",t:"Workflow → Define the approval workflow template and conditions"},{l:"D",t:"Notification Setup → Configure when notifications are sent"}],answer:["A","B","C","D"],explain:"Power Automate handles emails, Approval User Setup defines hierarchy, Workflow sets conditions, Notification Setup configures triggers.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-how-setup-email target=_blank class=explain-links-a>Email Setup ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/across-set-up-workflows target=_blank class=explain-links-a>Workflows ↗</a></div>"},
{id:149,topic:"Topic 1",num:19,type:"matching",text:"You need to create a new company configured similarly to an existing company. Match each tool to the correct requirement.",options:[{l:"A",t:"Configuration Packages → Copy master data and setup data between companies"},{l:"B",t:"Copy Company → Create an exact duplicate of a company including all data"},{l:"C",t:"Configuration Worksheet → Selectively copy specific table data from another company"}],answer:["A","B","C"],explain:"Config packages for selective data, Copy Company for full duplication, Config Worksheet for table-by-table copying."},
{id:150,topic:"Topic 1",num:21,type:"matching",text:"You need to configure security for Dynamics 365 Business Central objects. Match each permission type to the correct object type.",options:[{l:"A",t:"Table Data → Read, Insert, Modify, Delete"},{l:"B",t:"Table → Indirect/Direct permissions"},{l:"C",t:"Report → Execute permission"},{l:"D",t:"Codeunit → Execute permission"}],answer:["A","B","C","D"],explain:"Table Data allows RIMD (Read, Insert, Modify, Delete). Reports and Codeunits use Execute permission. Tables use Indirect/Direct."},
{id:151,topic:"Topic 1",num:22,type:"multi",text:"You are setting up a Purchase Document Approval system. Sara processes POs (must be approved). Michelle approves up to $10,000. Shawn up to $50,000. Remy approves above $50,000. Which setup is correct for the approval hierarchy?",options:[{l:"A",t:"Sara\'s Approver ID = Michelle, Approval Limit = 0"},{l:"B",t:"Michelle\'s Approver ID = Shawn, Approval Limit = 10000"},{l:"C",t:"Shawn\'s Approver ID = Remy, Approval Limit = 50000"},{l:"D",t:"Remy\'s Approver ID = blank, Approval Limit = unlimited"},{l:"E",t:"Sara\'s Approver ID = Remy, Approval Limit = 0"}],answer:["A","B","C","D"],explain:"Each user\'s approver ID points to their direct supervisor, with approval limits matching the stated thresholds. Sara → Michelle → Shawn → Remy.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-define-granular-permissions target=_blank class=explain-links-a>Permissions ↗</a></div>"},
{id:152,topic:"Topic 1",num:25,type:"ordering",text:"You create several dimensions for cost analyses. Some dimension value combinations are not allowed when posting purchase transactions. You need to set up dimension combinations. In which order should you perform the actions?",options:[{l:"1",t:"Open the Dimension Combinations page"},{l:"2",t:"Select the two dimensions to restrict"},{l:"3",t:"Set the combination restriction to Limited"},{l:"4",t:"Define the allowed/blocked dimension value combinations"}],answer:["1","2","3","4"],explain:"Open Dimension Combinations → Select dimension pair → Set restriction type → Define specific value combinations.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:153,topic:"Topic 1",num:29,type:"multi",text:"You need to create a user account for a new salesperson with the same permissions as other salespeople. How should you configure the system?",options:[{l:"A",t:"Get New Users from Microsoft 365"},{l:"B",t:"Assign existing salesperson User Group to the new user"},{l:"C",t:"Create a new Permission Set for the user"},{l:"D",t:"Create a Salesperson/Purchaser record"},{l:"E",t:"Copy permissions from another user manually"}],answer:["A","B","D"],explain:"Get user from M365, assign existing User Group (same permissions), create Salesperson/Purchaser record for sales tracking."},
{id:154,topic:"Topic 1",num:30,type:"multi",text:"You need to customize sales invoice printouts: display city before postal code and show company logo to the right of customer address. Where should you make configuration changes?",options:[{l:"A",t:"Company Information page → set Logo Position to Right"},{l:"B",t:"Company Information page → Address Format"},{l:"C",t:"Report Layout Selection page"},{l:"D",t:"Countries/Regions page → Address Format = City+Post Code"},{l:"E",t:"Custom Report Layouts page"}],answer:["A","D"],explain:"Logo Position on Company Information controls logo placement. Countries/Regions Address Format controls city vs postal code order."},
{id:155,topic:"Topic 1",num:31,type:"ordering",text:"A user moves from the purchasing department to another department. You need to remove all personalizations in the user\'s profile. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the User Personalization page"},{l:"2",t:"Select the user record"},{l:"3",t:"Clear the Profile ID to remove the current profile"},{l:"4",t:"Use Clear Personalization to remove all user customizations"},{l:"5",t:"Assign the new department\'s profile"}],answer:["1","2","4","5"],explain:"Open User Personalization → Select user → Clear their personalizations → Assign new profile. Step 3 isn\'t needed since we assign a new profile directly.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:156,topic:"Topic 1",num:33,type:"matching",text:"You need to create posting details for master data. Match each setting to the correct requirement.",options:[{l:"A",t:"Gen. Business Posting Group → Assigned to customers and vendors for tax/trade classification"},{l:"B",t:"Gen. Product Posting Group → Assigned to items for product classification"},{l:"C",t:"Customer Posting Group → Links customer transactions to receivables G/L accounts"},{l:"D",t:"Vendor Posting Group → Links vendor transactions to payables G/L accounts"}],answer:["A","B","C","D"],explain:"Business groups classify trade partners, Product groups classify items, Customer/Vendor posting groups map to specific G/L accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:157,topic:"Topic 1",num:34,type:"ordering",text:"You grant the financial bookkeeper the D365 ACCOUNTANTS permission set. An auditor needs view-only access to the same data. You need to create the permission set for the auditor. In which order should you perform the actions?",options:[{l:"1",t:"Copy the D365 ACCOUNTANTS permission set"},{l:"2",t:"Rename the new permission set (e.g., AUDITOR)"},{l:"3",t:"Remove Insert, Modify, and Delete permissions"},{l:"4",t:"Assign the new permission set to the auditor user"}],answer:["1","2","3","4"],explain:"Copy existing set → Rename → Remove write permissions (keep only Read) → Assign to auditor."},
{id:158,topic:"Topic 1",num:37,type:"matching",text:"You need to ensure that the user interface (UI) meets client requirements. Match each approach to the correct requirement.",options:[{l:"A",t:"Profiles (Roles) → Assign a role-based default layout and pages"},{l:"B",t:"Personalization → Allow individual users to customize their workspace"},{l:"C",t:"Page Customization → Developer changes to page layout for all users of a profile"},{l:"D",t:"Designer Mode → Non-developer visual customization of pages for a profile"}],answer:["A","B","C","D"],explain:"Profiles set defaults, Personalization is per-user, Page Customization is developer-level per-profile, Designer Mode is visual per-profile editing.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:159,topic:"Topic 1",num:38,type:"matching",text:"You need to configure approval workflow for purchase orders. Only one of two finance managers is required to approve. Match each page to the correct configuration.",options:[{l:"A",t:"Approval User Setup → Set both managers with the same Approver ID and limits"},{l:"B",t:"Workflow → Configure the approval workflow with Approver type = Approver Group"},{l:"C",t:"Workflow User Groups → Create a group containing both managers"}],answer:["A","B","C"],explain:"Create a Workflow User Group with both managers, then in the Workflow, set Approver type to use that group so either can approve."},
{id:160,topic:"Topic 1",num:39,type:"ordering",text:"A salesperson reports they can see sales orders for other sales team members. You need to ensure sales team members can only see their own sales orders. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the User Setup page"},{l:"2",t:"Assign the Salespers./Purch. Code to each user"},{l:"3",t:"Open Sales & Receivables Setup"},{l:"4",t:"Set Salesperson Filter to the user\'s Salespers./Purch. Code"}],answer:["3","1","2","4"],explain:"Configure Sales & Receivables Setup for salesperson filtering, then set up each user with their salesperson code and filter.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:161,topic:"Topic 1",num:40,type:"matching",text:"A sales order of more than $10,000 must be approved by the sales director. Match each page to the correct workflow setup step.",options:[{l:"A",t:"Workflow → Define the sales order approval workflow with amount condition > $10,000"},{l:"B",t:"Approval User Setup → Set the sales director as approver with sufficient limit"},{l:"C",t:"Notification Setup → Configure how the sales director receives approval requests"}],answer:["A","B","C"],explain:"Workflow defines the trigger and conditions, Approval User Setup defines who approves, Notification Setup controls how they\'re notified."},
{id:162,topic:"Topic 1",num:41,type:"multi",text:"You need to configure a customer card: process payments through a bank account, bill a different customer for invoices, and print invoices in a specific language. Which components should you use?",options:[{l:"A",t:"Payment Method Code with bank account → Process payments through bank"},{l:"B",t:"Bill-to Customer No. → Bill a different customer"},{l:"C",t:"Language Code → Print invoices in specific language"},{l:"D",t:"Preferred Bank Account → Process payments"},{l:"E",t:"Responsibility Center → Language setting"}],answer:["A","B","C"],explain:"Payment Method with balance account for bank payments, Bill-to Customer for alternate billing, Language Code for document language."},
{id:163,topic:"Topic 1",num:42,type:"multi",text:"You need to configure a cash receipt journal batch: use a bank account by default and automatically archive posted journals. The company uses accrual basis. Which options should you use?",options:[{l:"A",t:"Bal. Account Type = Bank Account"},{l:"B",t:"Bal. Account No. = the bank account number"},{l:"C",t:"Copy to Posted Jnl. = Yes"},{l:"D",t:"Reason Code = CASH"},{l:"E",t:"Template Type = Cash Receipts"}],answer:["A","B","C"],explain:"Set balancing account type to Bank Account, specify the bank account, and enable Copy to Posted Journal for archiving."},
{id:164,topic:"Topic 1",num:45,type:"ordering",text:"You need to duplicate a company based on an existing Dynamics 365 Business Central company. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Companies page"},{l:"2",t:"Select the source company"},{l:"3",t:"Use the Copy action"},{l:"4",t:"Enter the new company name"},{l:"5",t:"Select which data to include (Setup, Master, Transactional)"}],answer:["1","2","3","4","5"],explain:"Open Companies → Select source → Copy → Name new company → Choose data scope."},
{id:165,topic:"Topic 1",num:46,type:"ordering",text:"You need to import vendor master data and bank account details using a configuration package. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create a configuration package"},{l:"2",t:"Add the Vendor table and Vendor Bank Account table"},{l:"3",t:"Export the package to Excel"},{l:"4",t:"Fill in vendor data and bank details in Excel"},{l:"5",t:"Import the Excel file back and apply the package"}],answer:["1","2","3","4","5"],explain:"Create package → Add both tables → Export template → Fill data → Import and apply."},
