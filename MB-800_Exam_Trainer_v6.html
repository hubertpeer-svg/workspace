{id:166,topic:"Topic 1",num:49,type:"matching",text:"A company must import opening balances for Item, Bank, and Customer. Match each component to the correct opening balance type.",options:[{l:"A",t:"Item Journal → Import item opening balances/inventory quantities"},{l:"B",t:"General Journal (Bank) → Import bank account opening balances"},{l:"C",t:"General Journal (Customer) → Import customer opening balances"}],answer:["A","B","C"],explain:"Items use Item Journals, Bank and Customer opening balances use General Journals with appropriate account types.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:167,topic:"Topic 1",num:50,type:"ordering",text:"You need to import vendor opening balances in foreign currency using configuration packages. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create a configuration package with the Gen. Journal Line table"},{l:"2",t:"Export the package to Excel"},{l:"3",t:"Fill in vendor data including currency codes and amounts"},{l:"4",t:"Import the Excel file and apply to the journal"},{l:"5",t:"Post the general journal"}],answer:["1","2","3","4","5"],explain:"Create package for journal lines → Export → Fill data with currency → Import → Post.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-set-up-currencies target=_blank class=explain-links-a>Currencies ↗</a></div>"},
{id:168,topic:"Topic 1",num:51,type:"ordering",text:"The company recently restructured with few posted entries. You need to change the Global Dimensions. Which three actions should you perform in sequence?",options:[{l:"1",t:"Open the Change Global Dimensions page"},{l:"2",t:"Select the new Global Dimension 1 and/or 2"},{l:"3",t:"Start the change process (Sequential or Parallel)"}],answer:["1","2","3"],explain:"Open the page → Select new dimensions → Run the change. Sequential mode is best for few entries.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:169,topic:"Topic 1",num:53,type:"matching",text:"You need to configure approval workflows for purchase orders. Purchase orders of $600 or more must be automatically sent for approval. Match each area to the correct configuration.",options:[{l:"A",t:"Workflow Condition → Set amount threshold to >= $600"},{l:"B",t:"Workflow Response → Send approval request to approver"},{l:"C",t:"Event → On Send Document for Approval"},{l:"D",t:"Approval User Setup → Define who approves"}],answer:["A","B","C","D"],explain:"Event triggers the workflow, Condition filters by amount, Response sends the request, Approval User Setup defines approvers."},
{id:170,topic:"Topic 1",num:58,type:"matching",text:"The finance manager requires a specific group of operating team users to have access only to particular customer data. Match each page to the correct security configuration.",options:[{l:"A",t:"User Groups → Group the operating team users together"},{l:"B",t:"Permission Sets → Define data access permissions"},{l:"C",t:"Security Filters → Restrict access to specific customer records"}],answer:["A","B","C"],explain:"User Groups organize users, Permission Sets define what they can do, Security Filters restrict which records they can see.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-define-granular-permissions target=_blank class=explain-links-a>Permissions ↗</a></div>"},
{id:171,topic:"Topic 1",num:61,type:"ordering",text:"A company adds a user to Microsoft 365. Existing security groups do not have the required permission sets. You need to assign a security group and permissions. Which five actions should you perform in sequence?",options:[{l:"1",t:"Create a Security Group in Microsoft Entra ID"},{l:"2",t:"Add the user to the Security Group"},{l:"3",t:"Open Business Central and navigate to Security Groups"},{l:"4",t:"Assign permission sets to the Security Group"},{l:"5",t:"Verify the user has correct access"}],answer:["1","2","3","4","5"],explain:"Create Entra ID group → Add user → Configure in BC → Assign permissions → Verify.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-define-granular-permissions target=_blank class=explain-links-a>Permissions ↗</a></div>"},
{id:172,topic:"Topic 1",num:62,type:"ordering",text:"A manufacturer uses different prefixes for Raw Materials, WIP, and Finished Goods. You need to configure unique number series for each item type with manual selection. In which order should you perform the actions?",options:[{l:"1",t:"Create separate No. Series for each item type prefix"},{l:"2",t:"Set each No. Series to allow default numbering"},{l:"3",t:"Create No. Series Relationships between all item number series"},{l:"4",t:"Assign the primary No. Series on the Inventory Setup page"}],answer:["1","2","3","4"],explain:"Create individual series → Enable defaults → Link via relationships (for manual selection) → Assign primary series in setup."},
{id:173,topic:"Topic 1",num:63,type:"ordering",text:"The finance manager wants to restrict Power Automate access. Only trained users must create and run instant flows. Which three actions should you perform in sequence?",options:[{l:"1",t:"Create a new Permission Set for Power Automate access"},{l:"2",t:"Assign D365 AUTOMATE permission set to trained users only"},{l:"3",t:"Remove the default Power Automate permissions from standard user groups"}],answer:["3","1","2"],explain:"First remove default access, then create/assign specific permissions only to trained users."},
{id:174,topic:"Topic 2",num:2,type:"multi",text:"You need to validate the setup for the sales invoicing process. Which setup should you check for each process? (Select all that apply)",options:[{l:"A",t:"Sales & Receivables Setup → Invoice posting and number series"},{l:"B",t:"Customer Posting Groups → Receivables G/L account mapping"},{l:"C",t:"General Posting Setup → Sales and COGS accounts"},{l:"D",t:"Bank Account Posting Group → Bank reconciliation"},{l:"E",t:"Report Selection – Sales → Invoice report assignment"}],answer:["A","B","C","E"],explain:"Sales invoicing requires Sales & Receivables Setup, Customer Posting Groups, General Posting Setup, and Report Selection for invoice reports.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:175,topic:"Topic 2",num:5,type:"matching",text:"You need to configure a new journal template. Match each field to the correct requirement.",options:[{l:"A",t:"Type → Determines the journal purpose (General, Sales, Purchases, Cash Receipts, Payments)"},{l:"B",t:"Bal. Account Type → Sets the default balancing account type for journal lines"},{l:"C",t:"No. Series → Assigns document numbering for the journal"},{l:"D",t:"Source Code → Identifies the origin of posted entries in the audit trail"}],answer:["A","B","C","D"],explain:"Type sets purpose, Bal. Account Type defaults the balancing, No. Series controls numbering, Source Code tracks audit trail origin.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-create-number-series target=_blank class=explain-links-a>Number Series ↗</a></div>"},
{id:176,topic:"Topic 2",num:7,type:"multi",text:"A bank is implementing BC. Each bank account must be configured to a unique G/L Account. You need to set up the first bank account. Which configurations are required?",options:[{l:"A",t:"Create a Bank Account Posting Group with a unique G/L Account"},{l:"B",t:"Assign the Bank Account Posting Group to the Bank Account card"},{l:"C",t:"Set the Bank Account No. on the Bank Account card"},{l:"D",t:"Create a General Posting Setup entry for the bank"},{l:"E",t:"Set Currency Code if using foreign currency"}],answer:["A","B","C"],explain:"Create posting group with G/L account → Assign to bank card → Enter bank account number.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:177,topic:"Topic 2",num:11,type:"matching",text:"You need to set up posting groups according to the chart of accounts. Match each setup to the correct action.",options:[{l:"A",t:"Customer Posting Group → Map to Receivables Account in chart of accounts"},{l:"B",t:"Vendor Posting Group → Map to Payables Account in chart of accounts"},{l:"C",t:"Inventory Posting Setup → Map to Inventory Account in chart of accounts"},{l:"D",t:"General Posting Setup → Map Sales, Purchase, and COGS accounts"}],answer:["A","B","C","D"],explain:"Each posting group type maps entities to specific G/L accounts in the chart of accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:178,topic:"Topic 2",num:15,type:"ordering",text:"An accountant discovers inconsistencies between financial statements and chart of accounts balances. You suspect missing categories and subcategories. Which three actions should you perform in sequence?",options:[{l:"1",t:"Review and update Account Categories on G/L accounts"},{l:"2",t:"Verify Account Subcategories are correctly assigned"},{l:"3",t:"Generate the financial statements to validate corrections"}],answer:["1","2","3"],explain:"Review categories → Verify subcategories → Regenerate statements to confirm fix."},
{id:179,topic:"Topic 2",num:16,type:"matching",text:"You need to create posting groups for items, vendors, and customers. Match each posting group type to the correct entity.",options:[{l:"A",t:"Gen. Business Posting Group → Customers and Vendors"},{l:"B",t:"Gen. Product Posting Group → Items"},{l:"C",t:"Customer Posting Group → Customers (for receivables account)"},{l:"D",t:"Vendor Posting Group → Vendors (for payables account)"},{l:"E",t:"Inventory Posting Group → Items (for inventory account)"}],answer:["A","B","C","D","E"],explain:"Business groups for customers/vendors, Product groups for items, specific posting groups for receivables/payables/inventory.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a></div>"},
{id:180,topic:"Topic 2",num:17,type:"multi",text:"You are creating an expense account for office supplies. The account may be used for purchase invoice and general journal transactions. Which values should you configure?",options:[{l:"A",t:"Account Type = Posting"},{l:"B",t:"Income/Balance = Income Statement"},{l:"C",t:"Gen. Posting Type = Purchase"},{l:"D",t:"Direct Posting = Yes"},{l:"E",t:"Account Type = Total"}],answer:["A","B","C","D"],explain:"Posting type account, Income Statement classification, Purchase gen. posting type for VAT, Direct Posting enabled for journal use.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-setup-vat target=_blank class=explain-links-a>VAT Setup ↗</a></div>"},
{id:181,topic:"Topic 2",num:18,type:"multi",text:"You need to set up a bank account in US dollars with statement number starting at 9075. Which values should you use?",options:[{l:"A",t:"Currency Code = blank (for local currency USD)"},{l:"B",t:"Currency Code = USD"},{l:"C",t:"Balance Last Statement = 0"},{l:"D",t:"Statement No. = 9075"},{l:"E",t:"Bank Acc. Posting Group with correct G/L account"}],answer:["A","C","D","E"],explain:"Leave Currency Code blank for local currency. Set Statement No. to 9075. Configure posting group. Balance Last Statement starts at 0.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-set-up-currencies target=_blank class=explain-links-a>Currencies ↗</a></div>"},
{id:182,topic:"Topic 2",num:21,type:"matching",text:"Multiple users will work simultaneously in different general journals. Match each option to the correct requirement.",options:[{l:"A",t:"Journal Template → Separate templates for different transaction types"},{l:"B",t:"Journal Batch → Separate batches within a template for each user"},{l:"C",t:"No. Series → Unique numbering per batch to avoid conflicts"},{l:"D",t:"Bal. Account → Default balancing account per batch"}],answer:["A","B","C","D"],explain:"Templates separate by type, Batches separate by user, No. Series prevents conflicts, Bal. Account simplifies entry.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-create-number-series target=_blank class=explain-links-a>Number Series ↗</a></div>"},
{id:183,topic:"Topic 2",num:22,type:"matching",text:"You need to configure payment terms with correct due date formulas. Match each requirement to the correct formula.",options:[{l:"A",t:"Due 30 days from document date → 30D"},{l:"B",t:"Due at end of current month → CM"},{l:"C",t:"Due 15th of next month → CM+15D"},{l:"D",t:"Due end of next month → 1M+CM"}],answer:["A","B","C","D"],explain:"30D = 30 days, CM = current month end, CM+15D = 15th of next month, 1M+CM = end of next month."},
{id:184,topic:"Topic 2",num:24,type:"matching",text:"You need to set up general ledger accounts correctly. Match each setup to the correct requirement.",options:[{l:"A",t:"Income/Balance → Determines if account appears on Income Statement or Balance Sheet"},{l:"B",t:"Account Category → Groups accounts for financial reporting"},{l:"C",t:"Gen. Posting Type → Controls VAT calculation (Sale, Purchase, blank)"},{l:"D",t:"Reconciliation Account → Shows in journal reconciliation window"}],answer:["A","B","C","D"],explain:"Income/Balance classifies statement, Account Category groups for reports, Gen. Posting Type controls VAT, Reconciliation Account enables reconciliation.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:185,topic:"Topic 2",num:30,type:"matching",text:"You are setting up new customers and items. Match each posting group to the correct use case.",options:[{l:"A",t:"Customer Posting Group → Defines the Receivables Account for customer transactions"},{l:"B",t:"Gen. Business Posting Group → Assigned to customers for General Posting Setup lookup"},{l:"C",t:"Gen. Product Posting Group → Assigned to items for General Posting Setup lookup"},{l:"D",t:"Inventory Posting Group → Defines the Inventory Account for item transactions"}],answer:["A","B","C","D"],explain:"Customer Posting Group → Receivables. Gen. Bus. → Customer classification. Gen. Prod. → Item classification. Inventory → Inventory account.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a></div>"},
{id:186,topic:"Topic 2",num:34,type:"ordering",text:"You need to restrict a purchasing agent from viewing G/L amounts while allowing them to create purchase documents. Which three actions should you perform in sequence?",options:[{l:"1",t:"Copy the existing purchasing permission set"},{l:"2",t:"Remove Read permission on G/L Entry table data (amounts)"},{l:"3",t:"Assign the modified permission set to the purchasing agent"}],answer:["1","2","3"],explain:"Copy the base set → Remove G/L amount read access → Assign to user."},
{id:187,topic:"Topic 2",num:38,type:"ordering",text:"The customer requires two global dimensions to be automatically checked on all income statement accounts. You need to set up this requirement for all accounts at once. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Chart of Accounts page"},{l:"2",t:"Filter to show only Income Statement accounts"},{l:"3",t:"Select all filtered accounts"},{l:"4",t:"Use Set Default Dimensions action to set Value Posting = Code Mandatory for both dimensions"}],answer:["1","2","3","4"],explain:"Filter chart of accounts to income statement → Select all → Set default dimensions with Code Mandatory for both global dimensions.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:188,topic:"Topic 2",num:39,type:"multi",text:"You are creating a G/L account for a checking account in the chart of accounts. Which values should you configure?",options:[{l:"A",t:"Account Type = Posting"},{l:"B",t:"Income/Balance = Balance Sheet"},{l:"C",t:"Account Category = Assets"},{l:"D",t:"Direct Posting = No"},{l:"E",t:"Income/Balance = Income Statement"}],answer:["A","B","C","D"],explain:"Checking is a Balance Sheet asset. Direct Posting = No because postings should go through Bank Account entries, not directly.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:189,topic:"Topic 2",num:43,type:"ordering",text:"You need to automatically create vendor payments based on posted purchase invoices, summarized by vendor. Which three actions should you perform in sequence?",options:[{l:"1",t:"Open a Payment Journal"},{l:"2",t:"Run Suggest Vendor Payments with Summarize per Vendor enabled"},{l:"3",t:"Review and post the payment journal"}],answer:["1","2","3"],explain:"Open Payment Journal → Suggest Vendor Payments with summarization → Review and post."},
{id:190,topic:"Topic 2",num:48,type:"ordering",text:"The operations team posts an incorrect quantity on a purchase receipt. You need to undo the quantity posting before invoicing. Which four actions should you perform in sequence?",options:[{l:"1",t:"Navigate to the Posted Purchase Receipt"},{l:"2",t:"Open the posted receipt lines"},{l:"3",t:"Select the line with incorrect quantity"},{l:"4",t:"Use the Undo Receipt action"}],answer:["1","2","3","4"],explain:"Find the posted receipt → Open lines → Select the incorrect line → Undo Receipt reverses the quantity."},
{id:191,topic:"Topic 2",num:53,type:"matching",text:"You need to configure posting groups for different requirements. Match each posting group to the correct requirement.",options:[{l:"A",t:"Customer Posting Group → Invoice rounding accounts for external parties"},{l:"B",t:"Bank Account Posting Group → Entries linked to financial institution activities"},{l:"C",t:"Customer Posting Group → Payment discounts granted to customers"}],answer:["A","B","C"],explain:"Customer Posting Groups handle invoice rounding and payment discounts. Bank Account Posting Groups handle bank-related entries.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-set-up-invoice-rounding target=_blank class=explain-links-a>Invoice Rounding ↗</a></div>"},
{id:192,topic:"Topic 2",num:56,type:"matching",text:"The finance manager needs to configure payment and expense posting. Match each page to the correct requirement.",options:[{l:"A",t:"Payment Journal → Get suggested payments to vendors based on due dates"},{l:"B",t:"Cash Receipt Journal → Apply customer payments to multiple invoices"},{l:"C",t:"Payment Journal → Submit electronic payments to the bank"},{l:"D",t:"General Journal → Reimburse an employee to a dedicated bank account"}],answer:["A","B","C","D"],explain:"Payment Journal for vendor payments and electronic banking. Cash Receipt Journal for customer payments. General Journal for employee reimbursement.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:193,topic:"Topic 2",num:57,type:"matching",text:"You need to map entities to general ledger accounts through posting groups. Match each posting group to the correct requirement.",options:[{l:"A",t:"Customer Posting Group → Map customers to Receivables G/L account"},{l:"B",t:"Vendor Posting Group → Map vendors to Payables G/L account"},{l:"C",t:"Inventory Posting Group → Map items to Inventory G/L account"},{l:"D",t:"General Posting Setup → Map combinations to Sales/COGS accounts"}],answer:["A","B","C","D"],explain:"Each posting group type maps different entities to their respective G/L accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:194,topic:"Topic 3",num:10,type:"matching",text:"You need to create items in Business Central. Match each item type to the correct scenario.",options:[{l:"A",t:"Inventory → Physical products tracked in stock with valuation"},{l:"B",t:"Service → Labor or services without physical stock"},{l:"C",t:"Non-Inventory → Physical products not tracked in inventory (e.g., office supplies)"}],answer:["A","B","C"],explain:"Inventory for tracked physical goods, Service for labor, Non-Inventory for untracked physical items."},
{id:195,topic:"Topic 3",num:14,type:"matching",text:"You need to configure the system so the correct net price displays on sales orders. Match each setup type to the correct scenario.",options:[{l:"A",t:"Sales Price List → Customer-specific prices for items"},{l:"B",t:"Sales Line Discount → Percentage discounts on specific items"},{l:"C",t:"Unit Price on Item Card → Default price for all customers"},{l:"D",t:"Invoice Discount → Discount based on total invoice amount"}],answer:["A","B","C","D"],explain:"Price Lists for customer-specific pricing, Line Discounts for item discounts, Unit Price for default, Invoice Discount for totals."},
{id:196,topic:"Topic 3",num:15,type:"ordering",text:"You need to describe the hierarchical order of elements in inventory posting, beginning with master data. Which three entities form the hierarchy?",options:[{l:"1",t:"Inventory Posting Group (assigned on Item Card)"},{l:"2",t:"Inventory Posting Setup (maps group + location to G/L accounts)"},{l:"3",t:"General Ledger Accounts (final posting destination)"}],answer:["1","2","3"],explain:"Item has Inventory Posting Group → Setup maps Group+Location to accounts → G/L Accounts receive the postings.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:197,topic:"Topic 3",num:17,type:"matching",text:"You need to configure an item that is a tangible good acquired by purchase specifically for each demand instance. Match each field to the correct value.",options:[{l:"A",t:"Type = Inventory"},{l:"B",t:"Replenishment System = Purchase"},{l:"C",t:"Reordering Policy = Order"}],answer:["A","B","C"],explain:"Inventory type for tangible goods, Purchase replenishment, Order reordering policy for per-demand purchasing.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a></div>"},
{id:198,topic:"Topic 3",num:21,type:"ordering",text:"Partially shipped/invoiced sales orders must not display on the Open Sales Order list. Deleted orders must remain available for reporting. Which actions should you perform in sequence?",options:[{l:"1",t:"Enable Archiving of Orders in Sales & Receivables Setup"},{l:"2",t:"Archive the sales orders before deletion"},{l:"3",t:"Delete the partially fulfilled sales orders"}],answer:["1","2","3"],explain:"Enable archiving → Archive the orders → Delete from the active list. Archived orders remain available for reporting."},
{id:199,topic:"Topic 3",num:24,type:"ordering",text:"A company bills thousands of recurring subscription invoices monthly. You need to ensure recurring sales invoices are automatically created. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create Standard Sales Codes with recurring lines"},{l:"2",t:"Assign Standard Sales Codes to customers"},{l:"3",t:"Run the Create Recurring Sales Invoices batch job"},{l:"4",t:"Review and post the generated invoices"}],answer:["1","2","3","4"],explain:"Create standard codes → Assign to customers → Run batch job → Review and post."},
{id:200,topic:"Topic 3",num:25,type:"ordering",text:"A user created two accounts for the same vendor with open entries. You need to merge entries from the second to the first and delete the second. Which three actions should you perform in sequence?",options:[{l:"1",t:"Open the Merge Duplicate page for Vendors"},{l:"2",t:"Select the duplicate vendor to merge into the primary"},{l:"3",t:"Run the merge action to transfer all entries"}],answer:["1","2","3"],explain:"Use Merge Duplicate to combine vendor records and transfer all ledger entries.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:201,topic:"Topic 3",num:30,type:"matching",text:"Purchasing and AP departments need vendor information. Match each location to the correct information.",options:[{l:"A",t:"Vendor Card → Balance (LCY) for the vendor"},{l:"B",t:"Vendor Ledger Entries → Remaining Amount for a ledger entry"},{l:"C",t:"Detailed Vendor Ledger Entries → Amount for application entry"}],answer:["A","B","C"],explain:"Vendor Card shows overall balance, Vendor Ledger Entries show remaining per entry, Detailed entries show application amounts."},
{id:202,topic:"Topic 3",num:31,type:"ordering",text:"A maintenance manager wants to automate purchase order entries for weekly cleaning supplies. You need to configure a default G/L account on hardware store purchase orders. Which three actions should you perform in sequence?",options:[{l:"1",t:"Create a Recurring Purchase Line with the G/L account"},{l:"2",t:"Assign the recurring line to the hardware store vendor"},{l:"3",t:"When creating a PO, the recurring lines populate automatically"}],answer:["1","2","3"],explain:"Create recurring purchase lines → Assign to vendor → Lines auto-populate on new POs."},
{id:203,topic:"Topic 3",num:40,type:"ordering",text:"You need to set up item discounts separately to meet business needs. The new sales pricing experience has not been enabled. Which three actions should you perform in sequence?",options:[{l:"1",t:"Navigate to Sales Line Discounts page"},{l:"2",t:"Create discount entries with Item and Customer criteria"},{l:"3",t:"Set the discount percentage and any minimum quantity"}],answer:["1","2","3"],explain:"Open Sales Line Discounts → Create entries for item/customer combinations → Set discount details.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:204,topic:"Topic 3",num:46,type:"matching",text:"You need to configure invoice posting policies. Match each policy to the correct requirement.",options:[{l:"A",t:"Allowed → Users can choose to ship and/or invoice when posting"},{l:"B",t:"Mandatory (Shipment only) → Users can only ship, invoicing is separate"},{l:"C",t:"Prohibited → Users cannot post from this document type"}],answer:["A","B","C"],explain:"Allowed gives flexibility, Mandatory restricts to shipment only, Prohibited blocks posting entirely."},
{id:205,topic:"Topic 3",num:48,type:"ordering",text:"You need to ensure all sales orders post with a specific dimension, even when no default is set on the customer. Which four actions should you perform in sequence?",options:[{l:"1",t:"Navigate to Default Dimensions for the relevant dimension"},{l:"2",t:"Set Value Posting = Code Mandatory for the dimension"},{l:"3",t:"Apply to all customer records"},{l:"4",t:"Verify dimension is required when creating sales orders"}],answer:["1","2","3","4"],explain:"Set the dimension as Code Mandatory at the global level or per customer to enforce it on all transactions.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:206,topic:"Topic 3",num:50,type:"matching",text:"You need to explain the effects of different costing methods. Match each costing method to its effect.",options:[{l:"A",t:"FIFO → Cost is based on the oldest inventory received"},{l:"B",t:"Average → Cost is calculated as a weighted average of all stock"},{l:"C",t:"Standard → Cost uses a predetermined standard cost; variances are tracked"},{l:"D",t:"Specific → Cost is tied to a specific lot or serial number"}],answer:["A","B","C","D"],explain:"FIFO uses oldest cost, Average weights all stock, Standard uses preset costs with variance tracking, Specific tracks exact cost per unit.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-adjust-item-costs target=_blank class=explain-links-a>Item Costs ↗</a></div>"},
{id:207,topic:"Topic 3",num:58,type:"ordering",text:"The company must intermittently combine shipments manually on a single invoice. Which five actions should you perform in sequence?",options:[{l:"1",t:"Create individual sales orders for the customer"},{l:"2",t:"Post shipments from each order separately"},{l:"3",t:"Create a new sales invoice for the customer"},{l:"4",t:"Use Get Shipment Lines to add shipped items to the invoice"},{l:"5",t:"Post the combined invoice"}],answer:["1","2","3","4","5"],explain:"Create and ship individual orders → Create invoice → Get Shipment Lines to combine → Post.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:208,topic:"Topic 4",num:1,type:"matching",text:"You need to configure the system for accounts receivable role center enhancements. Match each feature to the correct requirement.",options:[{l:"A",t:"Headline → Display order count summary on role center"},{l:"B",t:"Personalization → Allow clerks to rearrange role center elements"},{l:"C",t:"Page Customization → Optimize field order for data entry"}],answer:["A","B","C"],explain:"Headlines show KPIs, Personalization allows repositioning, Page Customization optimizes field order.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a></div>"},
{id:209,topic:"Topic 4",num:2,type:"matching",text:"You need to create filters for ledger entries. Match each feature to the correct requirement.",options:[{l:"A",t:"Flow Filters → Filter calculated fields like balance and net change"},{l:"B",t:"Column Filters → Filter specific columns on list pages"},{l:"C",t:"Filter Pane → Apply multiple filters from the page filter panel"}],answer:["A","B","C"],explain:"Flow Filters for calculated fields (Date Filter, etc.), Column Filters for data fields, Filter Pane for combined filtering.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:210,topic:"Topic 4",num:5,type:"ordering",text:"You need to process a single full payment from a customer against two invoices using Payment Registration. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Payment Registration page"},{l:"2",t:"Select both invoices for the customer"},{l:"3",t:"Mark the Payment Made checkbox for each invoice"},{l:"4",t:"Post the payments"}],answer:["1","2","3","4"],explain:"Open Payment Registration → Find invoices → Mark as paid → Post."},
{id:211,topic:"Topic 4",num:7,type:"matching",text:"You have unpaid posted purchase invoices to reverse. Some need complete reversal, others partial. Match each action to the correct requirement.",options:[{l:"A",t:"Create Corrective Credit Memo → Complete reversal of the entire invoice"},{l:"B",t:"Create Credit Memo → Partial reversal, manually adjust quantities/amounts"}],answer:["A","B"],explain:"Corrective Credit Memo for full reversal, manual Credit Memo for partial."},
{id:212,topic:"Topic 4",num:8,type:"ordering",text:"The company\'s funds are limited and some invoices cannot be paid on time. You need to prioritize vendors for payment suggestions. Which three actions should you perform in sequence?",options:[{l:"1",t:"Set Priority on vendor cards (1 = highest priority)"},{l:"2",t:"Open Payment Journal and run Suggest Vendor Payments"},{l:"3",t:"Set Available Amount (LCY) to limit total payment amount"}],answer:["1","2","3"],explain:"Assign priority to vendors → Run Suggest Vendor Payments with available amount limit → High priority vendors are paid first."},
{id:213,topic:"Topic 4",num:11,type:"ordering",text:"You need to perform inventory valuation including received but not invoiced items. Which three actions should you recommend in sequence?",options:[{l:"1",t:"Enable Expected Cost Posting in Inventory Setup"},{l:"2",t:"Run Adjust Cost – Item Entries at month end"},{l:"3",t:"Close the Inventory Period for the month"}],answer:["1","2","3"],explain:"Enable expected cost posting → Adjust costs → Close inventory period to lock values."},
{id:214,topic:"Topic 4",num:12,type:"ordering",text:"A vendor sends a weekly invoice combining all deliveries. You need to explain the purchase invoicing steps. In which order?",options:[{l:"1",t:"Create a purchase order for each delivery"},{l:"2",t:"Post receipt for each delivery"},{l:"3",t:"When weekly invoice arrives, enter it as purchase invoice"},{l:"4",t:"Use Get Receipt Lines to add all received items"},{l:"5",t:"Post the purchase invoice"}],answer:["1","2","3","4","5"],explain:"Individual POs and receipts per delivery → Combined invoice → Get Receipt Lines → Post.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:215,topic:"Topic 4",num:13,type:"ordering",text:"You create a purchase return order for 50 pieces. The vendor has authorized the return. You need to apply the return to the original purchase. Which five actions should you perform in sequence?",options:[{l:"1",t:"Create the Purchase Return Order with 50 pieces"},{l:"2",t:"Use Apply-to Item Entry to link to original receipt"},{l:"3",t:"Post the Return Shipment"},{l:"4",t:"Create and post the Credit Memo"},{l:"5",t:"Verify the vendor ledger entries are correctly applied"}],answer:["1","2","3","4","5"],explain:"Create return → Apply to original → Ship return → Post credit memo → Verify."},
{id:216,topic:"Topic 4",num:20,type:"matching",text:"You need to demonstrate Page Inspection functionality. Match each feature to the correct information displayed.",options:[{l:"A",t:"Page → Shows the page name and ID"},{l:"B",t:"Table → Shows the source table for the page data"},{l:"C",t:"Extensions → Shows which extensions affect the page"},{l:"D",t:"Fields → Shows field names, values, and data types"}],answer:["A","B","C","D"],explain:"Page Inspection shows page details, source table, installed extensions, and field information.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-extensions target=_blank class=explain-links-a>Extensions ↗</a></div>"},
{id:217,topic:"Topic 4",num:21,type:"ordering",text:"You need to filter the Chart of Accounts to show Net Change for January 2020 and save the view. Which three actions should you perform in sequence?",options:[{l:"1",t:"Set the Date Filter to 01/01/2020..01/31/2020"},{l:"2",t:"Configure the view to show Net Change column"},{l:"3",t:"Save the filtered view using Save As for future use"}],answer:["1","2","3"],explain:"Apply date filter → Configure columns → Save the view."},
{id:218,topic:"Topic 4",num:22,type:"ordering",text:"You need to undo an incorrectly posted purchase receipt from a related purchase order. Which four actions should you perform in sequence?",options:[{l:"1",t:"Navigate to Posted Purchase Receipts"},{l:"2",t:"Open the posted receipt document"},{l:"3",t:"Select the receipt line to undo"},{l:"4",t:"Run the Undo Receipt function"}],answer:["1","2","3","4"],explain:"Find posted receipt → Open it → Select line → Undo Receipt."},
{id:219,topic:"Topic 4",num:25,type:"matching",text:"You need to correct errors on posted sales invoices. Match each action to the correct requirement.",options:[{l:"A",t:"Correct → Creates a credit memo AND a new corrected invoice"},{l:"B",t:"Cancel → Creates only a credit memo to void the invoice"},{l:"C",t:"Create Corrective Credit Memo → Creates a credit memo for manual adjustment"}],answer:["A","B","C"],explain:"Correct auto-creates both, Cancel only reverses, Corrective Credit Memo gives manual control."},
{id:220,topic:"Topic 4",num:26,type:"ordering",text:"You have a sales order with 100 items. You need to post a partial shipment of 50 items. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the sales order"},{l:"2",t:"Change Qty. to Ship to 50 on the order line"},{l:"3",t:"Select Ship as the posting option"},{l:"4",t:"Post the partial shipment"}],answer:["1","2","3","4"],explain:"Open order → Set Qty. to Ship = 50 → Choose Ship → Post."},
{id:221,topic:"Topic 4",num:31,type:"ordering",text:"You need to filter the customer list to show My Customers and calculate year-to-date sales. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Customer List page"},{l:"2",t:"Apply the My Customers filter view"},{l:"3",t:"Set the Date Filter to the current year"},{l:"4",t:"View the Sales (LCY) column for YTD amounts"}],answer:["1","2","3","4"],explain:"Open list → Filter to My Customers → Set date range → View sales totals."},
{id:222,topic:"Topic 4",num:36,type:"ordering",text:"You need to configure the purchase order process. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create the purchase order with vendor and items"},{l:"2",t:"Release the purchase order"},{l:"3",t:"Post the receipt when goods arrive"},{l:"4",t:"Post the invoice when vendor invoice is received"}],answer:["1","2","3","4"],explain:"Create PO → Release → Receive → Invoice."},
{id:223,topic:"Topic 4",num:37,type:"multi",text:"You need to configure purchase order processing: auto-archive documents and set default received quantity to remaining quantity. Which options should you use?",options:[{l:"A",t:"Archive Orders = Always on Purchases & Payables Setup"},{l:"B",t:"Default Qty. to Receive = Remainder on Purchases & Payables Setup"},{l:"C",t:"Default Qty. to Receive = Blank on Purchases & Payables Setup"},{l:"D",t:"Archive Orders = Never on Purchases & Payables Setup"}],answer:["A","B"],explain:"Archive Orders = Always for automatic archiving. Default Qty. to Receive = Remainder for auto-filling remaining quantity."},
{id:224,topic:"Topic 4",num:38,type:"multi",text:"The purchasing department needs to use over-receipts. How do you set up this functionality?",options:[{l:"A",t:"Create Over-Receipt Codes with tolerance percentage"},{l:"B",t:"Assign Over-Receipt Code to items or vendors"},{l:"C",t:"Enable over-receipts in Inventory Setup"},{l:"D",t:"Configure approval workflow for over-receipts"}],answer:["A","B"],explain:"Create over-receipt codes with tolerance % → Assign to items or vendors. No special setup needed in Inventory Setup.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/inventory-how-register-new-items target=_blank class=explain-links-a>Items ↗</a></div>"},
{id:225,topic:"Topic 4",num:39,type:"ordering",text:"A user creates a quote for a contact who accepts it. The user must convert the quote to a sales fulfillment order. Which three actions should you perform in sequence?",options:[{l:"1",t:"Open the Sales Quote"},{l:"2",t:"Use the Make Order action"},{l:"3",t:"Confirm the conversion to create the Sales Order"}],answer:["1","2","3"],explain:"Open quote → Make Order → Confirm. The quote is converted to a sales order.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:226,topic:"Topic 4",num:51,type:"ordering",text:"You need to prepare a cash receipt journal to apply customer payments to multiple invoices. Which four actions should you perform in sequence?",options:[{l:"1",t:"Open the Cash Receipt Journal"},{l:"2",t:"Enter the customer number and payment amount"},{l:"3",t:"Use Apply Entries to select the invoices to apply"},{l:"4",t:"Post the cash receipt journal"}],answer:["1","2","3","4"],explain:"Open Cash Receipt Journal → Enter payment details → Apply to specific invoices → Post."},
{id:227,topic:"Topic 4",num:52,type:"matching",text:"The company is evaluating Microsoft Power Platform integration. Match each tool to the correct business requirement.",options:[{l:"A",t:"Power BI → Provide financial reporting in real-time"},{l:"B",t:"Power Automate → Automate customer onboarding and invoice approvals"},{l:"C",t:"Power Apps → Integrate item scanning capabilities in the warehouse"}],answer:["A","B","C"],explain:"Power BI for reporting, Power Automate for workflow automation, Power Apps for custom mobile/scanning apps."},
{id:228,topic:"Topic 4",num:54,type:"ordering",text:"You need to advise a company how to process a purchase order. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create the purchase order"},{l:"2",t:"Receive the items into inventory"},{l:"3",t:"Enter the vendor invoice"},{l:"4",t:"Post the invoice"}],answer:["1","2","3","4"],explain:"Create PO → Receive goods → Enter invoice → Post invoice."},
{id:229,topic:"Topic 5",num:1,type:"multi",text:"Case Study: Wide World Importers. You need to report profitability by business line. How should you configure the system?",options:[{l:"A",t:"Create a dimension for Customer Source (Cash & Carry, Brokered)"},{l:"B",t:"Use Gen. Business Posting Groups for business line reporting"},{l:"C",t:"Create financial reports filtered by Customer Source dimension"},{l:"D",t:"Use Responsibility Centers for business line tracking"},{l:"E",t:"Configure Account Schedules with dimension filters"}],answer:["A","C","E"],explain:"Create a Customer Source dimension, then use Financial Reports/Account Schedules with dimension filters for profitability by business line.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:230,topic:"Topic 5",num:2,type:"ordering",text:"Case Study: Wide World Importers. You need to ensure any transaction using a customer account always includes the customer source dimension. Which five actions should you perform in sequence?",options:[{l:"1",t:"Create a Dimension named Customer Source"},{l:"2",t:"Create Dimension Values (Cash & Carry, Brokered)"},{l:"3",t:"Open Default Dimensions for the Customer table"},{l:"4",t:"Set Value Posting to Code Mandatory"},{l:"5",t:"Assign default dimension values to each customer"}],answer:["1","2","3","4","5"],explain:"Create dimension → Add values → Set as mandatory on Customer table → Assign values to customers.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:231,topic:"Topic 5",num:4,type:"ordering",text:"Case Study: Wide World Importers. You need to design a process to resolve the broker issues for Accounts. Which three actions should you perform in sequence?",options:[{l:"1",t:"Create a Vendor Template for broker vendors"},{l:"2",t:"Configure required fields in the template (posting group, payment terms)"},{l:"3",t:"Train users to create new brokers using the template"}],answer:["1","2","3"],explain:"Create vendor template → Configure all required fields → Train users to use templates for consistency."},
{id:232,topic:"Topic 6",num:1,type:"multi",text:"Case Study: Best for You Organics. You need to configure reporting for Customer Group, Item Group, Salesperson, and Region dimensions. What should you do?",options:[{l:"A",t:"Set up Customer Group and Item Group as Dimensions"},{l:"B",t:"Set up Salesperson and Region as Dimensions"},{l:"C",t:"Set Salesperson as Global Dimension 1"},{l:"D",t:"Set Region as Global Dimension 2"},{l:"E",t:"Use Analysis Views for multi-dimensional reporting"}],answer:["A","B","C","D"],explain:"Create dimensions for all reporting needs. Salesperson and Region as Global Dimensions 1 and 2 for efficient filtering.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:233,topic:"Topic 7",num:2,type:"multi",text:"Case Study: Wide World Importers. You need to configure sales invoices to show discounts. How should you configure the system?",options:[{l:"A",t:"Set Discount Posting = All Discounts in Sales & Receivables Setup"},{l:"B",t:"Enable Line Discount on the sales invoice report layout"},{l:"C",t:"Set Discount Posting = Line Discounts in General Posting Setup"},{l:"D",t:"Configure the invoice report to show Unit Price, Discount %, and Line Amount"}],answer:["A","D"],explain:"Set Discount Posting to All Discounts and configure the invoice report layout to display original price, discount, and net amount."},
{id:234,topic:"Topic 7",num:3,type:"multi",text:"Case Study: Wide World Importers. You need to resolve reconciliation issues. How should you complete the setup?",options:[{l:"A",t:"Set Direct Posting = No on reconciliation-sensitive G/L accounts"},{l:"B",t:"Enable Reconciliation Account on bank-related G/L accounts"},{l:"C",t:"Create separate Vendor Posting Groups for brokers"},{l:"D",t:"Enable Force Doc. Balance on journal templates"}],answer:["A","B"],explain:"Disable direct posting on sensitive accounts to prevent manual entries. Enable Reconciliation Account for bank accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:235,topic:"Topic 8",num:1,type:"multi",text:"Case Study: Best for You Organics. You need to set up a new fiscal year starting June 1 and restrict posting. Which options should you use?",options:[{l:"A",t:"Create Accounting Periods starting June 1"},{l:"B",t:"Set Allow Posting From/To dates in General Ledger Setup"},{l:"C",t:"Set user-specific posting dates in User Setup for accounting team"},{l:"D",t:"Close the fiscal year in Accounting Periods"},{l:"E",t:"Set fiscal year start on Company Information page"}],answer:["A","B","C"],explain:"Create periods from June 1, set global posting restrictions in GL Setup, grant exceptions via User Setup for accounting team."},
{id:236,topic:"Topic 8",num:2,type:"multi",text:"Case Study: Best for You Organics. You need to configure purchase order discounting and history. What should you do?",options:[{l:"A",t:"Set Calc. Inv. Discount on Purchases & Payables Setup"},{l:"B",t:"Configure Invoice Discounts on vendor cards"},{l:"C",t:"Enable Archive Orders on Purchases & Payables Setup"},{l:"D",t:"Set up Vendor Invoice Discount entries with percentages"}],answer:["A","C","D"],explain:"Enable automatic invoice discount calculation, archive orders for history, and configure vendor-specific discount entries."},
{id:237,topic:"Topic 8",num:3,type:"ordering",text:"Case Study: Best for You Organics. You need to configure the purchase order process with three-way matching. Which four actions should you perform in sequence?",options:[{l:"1",t:"Create the purchase order from the procurement department"},{l:"2",t:"Post the receipt when goods arrive at the warehouse"},{l:"3",t:"Match the vendor invoice against the PO and receipt"},{l:"4",t:"Post the purchase invoice after matching"}],answer:["1","2","3","4"],explain:"Create PO → Receive goods → Three-way match (PO, receipt, invoice) → Post invoice."},
{id:238,topic:"Topic 9",num:1,type:"ordering",text:"Case Study: Wide World Importers. You need to configure discounting for sales. Which three actions should you perform in sequence?",options:[{l:"1",t:"Create Customer Price Groups for buying groups"},{l:"2",t:"Set up Sales Prices per Customer Price Group"},{l:"3",t:"Configure Sales Line Discounts for promotional items"}],answer:["1","2","3"],explain:"Create price groups → Set group-specific prices → Add line discounts for promotions."},
{id:239,topic:"Topic 11",num:2,type:"ordering",text:"Case Study: Best for You Organics. You need to advise how to process existing sales orders. Which three actions should you recommend in sequence?",options:[{l:"1",t:"Release the sales order to the warehouse"},{l:"2",t:"Post the shipment from the warehouse"},{l:"3",t:"Post the invoice from the office"}],answer:["1","2","3"],explain:"Release order → Warehouse ships → Office invoices. This separates duties between warehouse and office.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:240,topic:"Topic 11",num:4,type:"multi",text:"Case Study: Best for You Organics. You need to create the process for salespeople. What should you do?",options:[{l:"A",t:"Train salespeople to create Sales Quotes from Opportunities"},{l:"B",t:"Use Make Order to convert quotes to sales orders"},{l:"C",t:"Check Item Availability before committing to quantities"},{l:"D",t:"Use Release to send orders to the warehouse"},{l:"E",t:"Post shipments directly from quotes"}],answer:["A","B","C","D"],explain:"Salespeople manage opportunities → Create quotes → Check availability → Convert to orders → Release to warehouse.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:241,topic:"Topic 11",num:5,type:"ordering",text:"Case Study: Best for You Organics. You need to configure the system to address costing adjustment concerns. Which four actions should you perform in sequence?",options:[{l:"1",t:"Set Allow Posting From/To dates to restrict posting to current month"},{l:"2",t:"Configure User Setup exceptions for accounting team"},{l:"3",t:"Run Adjust Cost – Item Entries before closing each period"},{l:"4",t:"Close the Inventory Period for the month"}],answer:["1","2","3","4"],explain:"Restrict posting dates → Set exceptions → Adjust costs → Close inventory period to prevent further changes."},
{id:242,topic:"Topic 13",num:65,type:"matching",text:"Case Study: Fabrikam. You need to recommend integration solutions to fulfill the company requirements. Which Microsoft integration aligns with each requirement?",stems:["Customer email collaboration (create sales orders while collaborating by email)","Sales team collaboration (edit customer info while messaging in group chat)","Customer notifications for sales campaign (communicate brochure to all customers)"],options:[{l:"A",t:"Business Central Outlook add-in"},{l:"B",t:"Business Central app for Teams"},{l:"C",t:"Word template"},{l:"D",t:"Power Automate"}],answer:["A","B","D"],explain:"Outlook add-in enables creating sales orders from email. Teams app allows editing BC records in chat. Power Automate can send bulk communications to all customers.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:243,topic:"Topic 13",num:67,type:"matching",text:"Case Study: Fabrikam. You need to create financial reports per company requirements. Which report configuration should you use for each report description?",stems:["Head count (statistical account)","Square Footage (statistical account)","Income, Retail","Accounts Receivables, Wholesale"],options:[{l:"A",t:"Row definition"},{l:"B",t:"Column definition"},{l:"C",t:"Financial Report page"},{l:"D",t:"G/L account categories"}],answer:["C","C","A","A"],explain:"Statistical accounts (headcount, square footage) are added via the Financial Report page. Revenue subcategories (Retail) and AR subcategories (Wholesale) are mapped through Row definitions that reference G/L account subcategories.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:244,topic:"Topic 13",num:127,type:"multi",text:"Case Study: Fabrikam. You need to configure the system to post to the receivables account for wholesale customers. Which two configurations should you use?",options:[{l:"A",t:"Receivables account 13100"},{l:"B",t:"General Posting Setup"},{l:"C",t:"Receivables account 13200"},{l:"D",t:"General Business Posting Groups"},{l:"E",t:"Customer Posting Groups"}],answer:["C","E"],explain:"Customer Posting Groups are used to assign specific receivables G/L accounts per customer type. Wholesale customers use receivables account 13200 per Fabrikam requirements.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:245,topic:"Topic 13",num:128,type:"matching",text:"Case Study: Fabrikam. You need to select the values for the customer payment terms. Which values should you use?",stems:["Discount % for wholesale customer payment term","Due Date Calculation for retail customer payment term","Discount Date Calculation for wholesale customer payment term","Due Date Calculation for wholesale customer payment term"],options:[{l:"A",t:"0D"},{l:"B",t:"2"},{l:"C",t:"10D"},{l:"D",t:"30D"}],answer:["B","A","C","D"],explain:"Wholesale: net 30 (Due=30D) with 2% discount (Disc%=2) if paid within 10 days (DiscDate=10D). Retail: payable on receipt (Due=0D).<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-payment-terms target=_blank class=explain-links-a>Payment Terms ↗</a></div>"},
{id:246,topic:"Topic 13",num:185,type:"multi",text:"Case Study: Fabrikam. You need to train users on order processing requirements and how to process purchase invoices created from combined receipts. Which two related processes should you include?",options:[{l:"A",t:"Create recurring purchase lines."},{l:"B",t:"Delete POs that are fully invoiced."},{l:"C",t:"Create a purchase credit memo."},{l:"D",t:"Correct or cancel unpaid purchase invoices."}],answer:["C","D"],explain:"When posted vendor invoices must be reverted for damages/returns, users need to create purchase credit memos or correct/cancel unpaid invoices.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/purchasing-how-record-purchases target=_blank class=explain-links-a>Purchasing ↗</a></div>"},
{id:247,topic:"Topic 13",num:187,type:"matching",text:"Case Study: Fabrikam. You need to resolve the order entry issue using recurring sales lines. How should you complete each action?",stems:["Configure standard sales lines","Add recurring sales lines to customers"],options:[{l:"A",t:"Add items and quantities"},{l:"B",t:"Add valid from and to dates"},{l:"C",t:"Set insert on orders to Always Ask"},{l:"D",t:"Set insert on quotes to Automatic"}],answer:["C","A"],explain:"Standard sales lines are configured with insert mode Always Ask (so the system asks if recurring lines should be added). Then items/quantities are added to the customer recurring lines."},
{id:248,topic:"Topic 13",num:188,type:"matching",text:"Case Study: Fabrikam. You need to complete inventory setup to meet requirements and resolve issues. Which configurations should you use?",stems:["Set the default costing method (inventory sold at cost based on purchase and sales over a period)","Resolve inventory reconciliation issue (prevent selling more inventory than physically available)"],options:[{l:"A",t:"Average"},{l:"B",t:"FIFO"},{l:"C",t:"Prevent negative inventory"},{l:"D",t:"Automatic cost posting"}],answer:["A","C"],explain:"Average costing is based on purchase and sales over a period. Prevent Negative Inventory stops users from selling more than physically available.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-adjust-item-costs target=_blank class=explain-links-a>Item Costs ↗</a></div>"},
{id:249,topic:"Topic 13",num:189,type:"multi",text:"Case Study: Fabrikam. You need to configure posting groups to post revenue per invoicing requirements (separate G/L accounts by customer type). Which two groups should you use?",options:[{l:"A",t:"Bank account posting groups"},{l:"B",t:"General business posting groups"},{l:"C",t:"Customer posting groups"},{l:"D",t:"General product posting groups"},{l:"E",t:"Inventory posting groups"}],answer:["B","D"],explain:"General Business Posting Groups (for customer type: wholesale/retail) combined with General Product Posting Groups determine which sales G/L accounts are used via General Posting Setup.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-posting-groups target=_blank class=explain-links-a>Posting Groups ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:250,topic:"Topic 14",num:52,type:"matching",text:"Case Study: Northwind. You need to configure retail store customer cards to track revenue by market. Which configuration should you use?",stems:["Assign the dimension code","Assign the dimension value code","Select value posting"],options:[{l:"A",t:"Market"},{l:"B",t:"Retail"},{l:"C",t:"Code Mandatory"},{l:"D",t:"Same Code"}],answer:["A","B","C"],explain:"Market dimension tracks customer type. Retail is the value for retail stores. Code Mandatory ensures every posting references a market dimension.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:251,topic:"Topic 14",num:122,type:"matching",text:"Case Study: Northwind. You need to create accounting periods based on the finance department requirements (fiscal year July 1 to June 30, 12 monthly periods). Which values should you use?",stems:["Starting date","No. of periods","Period length"],options:[{l:"A",t:"07/01/YYYY"},{l:"B",t:"12"},{l:"C",t:"1M"},{l:"D",t:"01/01/YYYY"}],answer:["A","B","C"],explain:"Fiscal year starts July 1 (07/01), with 12 monthly accounting periods (period length 1M)."},
{id:252,topic:"Topic 14",num:171,type:"matching",text:"Case Study: Northwind. You need to train the sales department how to correct posted sales invoices. Which action should you use for each scenario?",stems:["Posted invoice not paid, originally from a sales order","Posted invoice not paid, not from a sales order","Posted invoice has been paid, no warehouse documents required"],options:[{l:"A",t:"Cancel"},{l:"B",t:"Correct"},{l:"C",t:"Sales return order"},{l:"D",t:"Create corrective credit memo"}],answer:["B","A","D"],explain:"Correct reverses and creates a new invoice (for orders). Cancel simply reverses (for standalone invoices). Corrective credit memo handles paid invoices."},
{id:253,topic:"Topic 14",num:176,type:"multi",text:"Case Study: Northwind. You need to configure payment discounts to resolve the issue reported by AR users (customers take discounts after discount date has passed). Which two options should you configure?",options:[{l:"A",t:"Sales & Receivables Setup"},{l:"B",t:"Payment Discount Grace Period"},{l:"C",t:"Payment Tolerance Warning"},{l:"D",t:"Pmt. Disc. Tolerance Warning"}],answer:["B","D"],explain:"Payment Discount Grace Period allows accepting discounts after the date. Pmt. Disc. Tolerance Warning lets AR users accept or reject the tolerance.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-payment-terms target=_blank class=explain-links-a>Payment Terms ↗</a></div>"},
{id:254,topic:"Topic 14",num:238,type:"ordering",text:"Case Study: Northwind. You need to configure Business Central to pay vendors by EFT using a payment journal batch named EFT. Which five actions should you perform in sequence?",options:[{l:"A",t:"Open the General Journal Templates page"},{l:"B",t:"Select the required Payment template"},{l:"C",t:"Open the General Journal Batches page"},{l:"D",t:"Create a new batch named EFT"},{l:"E",t:"Enable the ability to export a payment file"}],answer:["A","B","C","D","E"],explain:"Open Journal Templates -> Select Payment template -> Open Batches -> Create EFT batch -> Enable payment file export for EFT functionality.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:255,topic:"Topic 15",num:248,type:"matching",text:"Case Study: Wide World Importers. You need to report profitability by business line. How should you configure the system?",stems:["Create a dimension","Assign the dimension","Select a value posting"],options:[{l:"A",t:"Value (Cash & Carry, Brokered)"},{l:"B",t:"G/L account"},{l:"C",t:"Code Mandatory"},{l:"D",t:"Combination"}],answer:["A","B","C"],explain:"Create dimension values for business lines (Cash & Carry, Brokered). Assign to G/L accounts used in sales. Set Code Mandatory so every transaction must reference a business line.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a></div>"},
{id:256,topic:"Topic 15",num:249,type:"ordering",text:"Case Study: Wide World Importers. You need to ensure any transaction using a customer account always includes the customer source dimension. Which five actions should you perform in sequence?",options:[{l:"A",t:"Create a dimension code to identify the customer source"},{l:"B",t:"Create dimension values for the customer source"},{l:"C",t:"Open the Account Type Default Dimension list from the Dimension Code"},{l:"D",t:"Add the Customer table"},{l:"E",t:"Set the Value Posting to Code Mandatory"}],answer:["A","B","C","D","E"],explain:"Create dimension -> Create values -> Open default dimensions -> Add Customer table -> Set Code Mandatory.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-dimensions target=_blank class=explain-links-a>Dimensions ↗</a></div>"},
{id:257,topic:"Topic 15",num:250,type:"multi",text:"Case Study: Wide World Importers. You need to configure the new customer creation process so users can quickly add new customers. Which two areas must you configure?",options:[{l:"A",t:"Responsibility center"},{l:"B",t:"Configuration worksheet"},{l:"C",t:"Configuration template"},{l:"D",t:"Permissions"}],answer:["B","C"],explain:"Configuration templates provide predefined field values for quick customer creation. Configuration worksheet helps set up the template structure.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-set-up-a-company-with-rapidstart target=_blank class=explain-links-a>RapidStart ↗</a></div>"},
{id:258,topic:"Topic 15",num:255,type:"matching",text:"Case Study: Wide World Importers. You need to configure sales invoices to show discounts. How should you configure the system?",stems:["Define simultaneous posting (where to configure discount posting)","Specify type to post separately (what setting to use)"],options:[{l:"A",t:"Sales & Receivables Setup"},{l:"B",t:"General Ledger Setup"},{l:"C",t:"Discount Posting"},{l:"D",t:"Invoice Disc. Code"}],answer:["A","C"],explain:"On Sales & Receivables Setup, set Discount Posting to post discounts separately so they appear on invoices.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a></div>"},
{id:259,topic:"Topic 15",num:256,type:"matching",text:"Case Study: Wide World Importers. You need to resolve reconciliation issues caused by manual entries to certain G/L accounts. How should you complete the setup?",stems:["Restrict use on (where to configure)","Set value for (which field)"],options:[{l:"A",t:"G/L Account Card"},{l:"B",t:"Direct Posting"},{l:"C",t:"General Ledger Setup"},{l:"D",t:"Reconciliation Account"}],answer:["A","B"],explain:"On the G/L Account Card, set Direct Posting = No to prevent manual journal entries to sensitive accounts.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-general-ledger target=_blank class=explain-links-a>General Ledger ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/ui-work-general-journals target=_blank class=explain-links-a>General Journals ↗</a></div>"},
{id:260,topic:"Topic 15",num:257,type:"multi",text:"Case Study: Wide World Importers. You need to set up payment terms for buying groups (all invoices during a month due on 20th of following month). Which two actions should you perform?",options:[{l:"A",t:"Set up payment terms with a value of CM+20D for the due date calculation."},{l:"B",t:"Assign the payment terms to the customer price group."},{l:"C",t:"Assign the payment terms to the customer."},{l:"D",t:"Assign the payment terms to the customer posting group."},{l:"E",t:"Set up payment terms with a value of D20 for the due date calculation."}],answer:["A","C"],explain:"CM+20D = Current Month end + 20 Days = 20th of following month. Payment terms are assigned directly to each customer card.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-payment-terms target=_blank class=explain-links-a>Payment Terms ↗</a></div>"},
{id:261,topic:"Topic 15",num:262,type:"ordering",text:"Case Study: Wide World Importers. You need to configure discounting for sales (consistent discounts for all items in a product line). Which three actions should you perform in sequence?",options:[{l:"A",t:"Create an Item Discount Group"},{l:"B",t:"Select the Item Discount Group for the Item"},{l:"C",t:"Define the Sales Line Discounts"}],answer:["A","B","C"],explain:"Create Item Discount Group -> Assign to items -> Define Sales Line Discounts for the group."},
{id:262,topic:"Topic 15",num:263,type:"single",text:"Case Study: Wide World Importers. A customer in the restaurant buying group purchases olive oil on the date of the overstock special. Regular price $20, buying group price $18, autumn promotion $19, overstock special 15% off regular price. You need to verify the sales price. Which price will the system generate?",options:[{l:"A",t:"$15.30"},{l:"B",t:"$16.15"},{l:"C",t:"$17.00"},{l:"D",t:"$18.00"}],answer:["C"],explain:"The system charges the lowest price. 15% off $20 = $17.00. Compare: buying group $18, promotion $19, overstock $17. The customer gets $17.00 (the best price)."},
{id:263,topic:"Topic 15",num:270,type:"multi",text:"Case Study: Wide World Importers. Some brokered customers require one invoice per week regardless of the number of orders or shipments. You need to configure sales invoicing. What are two possible ways to achieve this goal?",options:[{l:"A",t:"Combine Shipments"},{l:"B",t:"Get Shipment Lines from Sales Order"},{l:"C",t:"Sales Order Shipping"},{l:"D",t:"Sales Order Invoicing"},{l:"E",t:"Get Shipment Lines from Sales Invoice"}],answer:["A","E"],explain:"Combine Shipments creates one invoice from multiple shipments. Get Shipment Lines from Sales Invoice allows adding multiple shipment lines to a single invoice.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:264,topic:"Topic 16",num:258,type:"matching",text:"Case Study: Best for You Organics. You need to set up a new fiscal year starting June 1 and restrict posting for all users to the current fiscal year. Which options should you use?",stems:["Set up a new fiscal year","Define the fiscal year start date","Restrict posting"],options:[{l:"A",t:"Select Create Year"},{l:"B",t:"Check New Fiscal Year for June 1"},{l:"C",t:"In General Ledger Setup, set Allow Posting From/To to current dates"},{l:"D",t:"Select Close Year"}],answer:["A","B","C"],explain:"Create Year to set up periods. Mark June 1 as New Fiscal Year start. Use GL Setup posting restrictions for all users."},
{id:265,topic:"Topic 16",num:259,type:"matching",text:"Case Study: Best for You Organics. You need to configure purchase order discounting and history. What should you do?",stems:["Configure the preset invoice level discounts","Configure automatic invoice level discount calculation","Configure purchase order history"],options:[{l:"A",t:"Set Discount % on Vend. Invoice Discount"},{l:"B",t:"Set Calc. Inv. Discount to Yes on Purchase & Payables Setup"},{l:"C",t:"Set Archive Orders to Yes"},{l:"D",t:"Set Purch. Line Disc. Account on General Posting Setup"}],answer:["A","B","C"],explain:"Set vendor-specific discount percentages. Enable automatic calculation in P&P Setup. Archive orders to keep history for vendor negotiations."},
{id:266,topic:"Topic 16",num:261,type:"multi",text:"Case Study: Best for You Organics. You need to configure the system to meet the requirements for sending invoices (auto-email, use default template that must not be altered, customers who pre-pay must not receive invoices). Which three actions should you perform?",options:[{l:"A",t:"Set Email to Yes (Use Default Settings)."},{l:"B",t:"Allow Sender Substitution for SMTP Mail Setup."},{l:"C",t:"Set Email to Yes (Prompt for Settings)."},{l:"D",t:"Assign a Document Sending Profile to pre-pay customers where Email is set to No."},{l:"E",t:"Apply Office Server Settings to the SMTP Mail Setup."},{l:"F",t:"Assign a Document Sending Profile to customers where Email is set to Yes."}],answer:["A","E","F"],explain:"Use Default Settings ensures template is not altered. Apply Office Server Settings for SMTP. Assign Email=Yes profile to regular customers (pre-pay customers get Email=No).<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-users-profiles-roles target=_blank class=explain-links-a>Profiles & Roles ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/admin-how-setup-email target=_blank class=explain-links-a>Email Setup ↗</a></div>"},
{id:267,topic:"Topic 16",num:264,type:"multi",text:"Case Study: Best for You Organics. You need to set up units of measure for an item (warehouse as Case, expand to Each). What are two possible ways to achieve the goal?",options:[{l:"A",t:"Set a Unit of Measure for case to a Qty. of 10."},{l:"B",t:"Set a Qty. per Unit of Measure to 1 in the Item Units of Measure table."},{l:"C",t:"Set a Unit of Measure for case to a Qty. of 1."},{l:"D",t:"Add a Code and Description to the Units of Measure table."}],answer:["A","C"],explain:"Define Case as a unit of measure. Set the quantity relationship (e.g., 1 Case = 10 Each or 1 Case = 1 unit depending on the setup approach)."},
{id:268,topic:"Topic 16",num:265,type:"single",text:"Case Study: Best for You Organics. The accounting team uses a complex manual accrual process to determine the impact of items received but not invoiced. You need to configure the system to meet the requirements for received items. What should you do?",options:[{l:"A",t:"Set the default costing method to Standard"},{l:"B",t:"Turn on Automatic Cost Posting"},{l:"C",t:"Turn on Expected Cost Posting"},{l:"D",t:"Set Automatic Cost Adjustment to Always"}],answer:["C"],explain:"Expected Cost Posting automatically creates accrual entries when items are received but not yet invoiced, eliminating the manual accrual process."},
{id:269,topic:"Topic 16",num:266,type:"ordering",text:"Case Study: Best for You Organics. You need to advise the company on how to process existing sales orders (warehouse ships, office invoices). Which three actions should you recommend in sequence?",options:[{l:"A",t:"A warehouse employee changes the Posting Date to match the actual shipping date"},{l:"B",t:"A warehouse employee performs Post and Ship"},{l:"C",t:"An office employee performs Post and Invoice only"}],answer:["A","B","C"],explain:"Warehouse adjusts posting date -> Warehouse posts shipment -> Office posts invoice. This separates duties between warehouse and office.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:270,topic:"Topic 16",num:267,type:"single",text:"Case Study: Best for You Organics. Vendors often deliver higher quantities of produce than ordered (allowing for spoilage). The company does not want to allow over-receipt on non-produce items. You need to configure the system for receiving produce. What should you do?",options:[{l:"A",t:"Configure an Over-Receipt code with Tolerance percentage."},{l:"B",t:"Set up a Payment Tolerance percentage."},{l:"C",t:"Apply a Default Deferral template."},{l:"D",t:"Set the Dampener Quantity to a value greater than zero."}],answer:["A"],explain:"Over-Receipt codes with tolerance percentages allow receiving more than ordered. Assign only to produce items so non-produce items are not affected."},
{id:271,topic:"Topic 16",num:268,type:"matching",text:"Case Study: Best for You Organics. You need to create the process for salespeople (determine inventory availability, process quotes to release orders). What should you do?",stems:["Deliver on a specific customer date (determine if inventory is available)","Process quotes (release orders to warehouse once quote is final)"],options:[{l:"A",t:"View the Item Availability by Periods"},{l:"B",t:"Change the Requested Delivery Date"},{l:"C",t:"Choose Make Order"},{l:"D",t:"Choose Release"}],answer:["A","D"],explain:"View Item Availability by Periods helps salespeople check stock before promising. Release sends the finalized order to the warehouse for fulfillment.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/sales-how-sell-products target=_blank class=explain-links-a>Sales Process ↗</a> <a href=https://learn.microsoft.com/en-us/dynamics365/business-central/warehouse-manage-warehouse target=_blank class=explain-links-a>Warehouse ↗</a></div>"},
{id:272,topic:"Topic 16",num:269,type:"ordering",text:"Case Study: Best for You Organics. You need to configure the system to address costing adjustment concerns (restrict cost changes to closed months). Which four actions should you perform in sequence?",options:[{l:"A",t:"Set up inventory periods"},{l:"B",t:"Run the Adjust Cost - Item Entries batch job"},{l:"C",t:"Run Post Inventory Cost to G/L"},{l:"D",t:"Close the inventory period"}],answer:["A","B","C","D"],explain:"Set up inventory periods -> Adjust costs -> Post to G/L -> Close the period to prevent further adjustments.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/finance-adjust-item-costs target=_blank class=explain-links-a>Item Costs ↗</a></div>"},
{id:273,topic:"Topic 1",num:29,type:"matching",text:"You need to create a user account for a new salesperson. The account must have the same permissions as other salespeople. How should you configure the system?",stems:["Add a new user","Apply permissions to the user"],options:[{l:"A",t:"Add a user to User Setup from BC"},{l:"B",t:"Update users from Microsoft 365"},{l:"C",t:"Assign user to a User Group"},{l:"D",t:"Select New on the Users page"}],answer:["B","C"],explain:"Update users from M365 to add the new user. Then assign the existing salesperson User Group to give the same permissions."},
{id:274,topic:"Topic 1",num:32,type:"matching",text:"A company creates blanket purchase orders. When a new blanket PO is created with a certain item, the system must send a procurement supervisor a request to approve. POs must not be posted until approved. You need to configure the system.",stems:["Lock the record for newly created blanket POs with the specific item","Assign the command that tells the system to lock the PO","Assign the items that trigger the locking of the PO"],options:[{l:"A",t:"Business Central workflows"},{l:"B",t:"Then Response"},{l:"C",t:"On Condition"},{l:"D",t:"Power Automate flows"}],answer:["A","B","C"],explain:"BC workflows handle approval processes. Then Response defines the lock action. On Condition specifies which items trigger the workflow.<div class=explain-links><a href=https://learn.microsoft.com/en-us/dynamics365/business-central/across-set-up-workflows target=_blank class=explain-links-a>Workflows ↗</a></div>"},
