function getCaseStudyHtml(q){
  let csKey=null;
  for(const k in CASE_STUDIES){
    if(q.text&&q.text.includes('Case Study')&&(q.text.includes(k)||q.topic.includes(k.split(' ')[0])))
      { csKey=k; break; }
  }
  if(!csKey){
    const topicMap={"Topic 13":"Fabrikam","Topic 14":"Northwind Traders","Topic 15":"Wide World Importers","Topic 16":"Best for You Organics"};
    if(topicMap[q.topic]) csKey=topicMap[q.topic];
  }
  if(!csKey) return '';
  return `<details style="margin-bottom:16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:0">
    <summary style="cursor:pointer;padding:12px 16px;font-size:13px;color:var(--amber);font-weight:600">📋 Case Study: ${csKey}</summary>
    <div style="padding:4px 16px 14px;font-size:13px;color:var(--text2);line-height:1.6">${CASE_STUDIES[csKey]}</div>
  </details>`;
}

// ─── USER & HISTORY SYSTEM ─────────────────────────────────────────────────
const USERS_KEY='mb800_users';
let activeUser='';
function loadUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||{};}catch(e){return {};}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u));}
function getHistory(){const users=loadUsers();return(users[activeUser]||{}).history||{};}
function saveHistory(h){const users=loadUsers();if(!users[activeUser])users[activeUser]={history:{}};users[activeUser].history=h;saveUsers(users);}
function getUserSummary(name){const users=loadUsers();const h=(users[name]||{}).history||{};let ok=0,fail=0,unique=0;for(const id in h){unique++;ok+=h[id].c;fail+=h[id].w;}return{ok,fail,total:ok+fail,unique};}
function recordAnswer(qId,ok){const h=getHistory();if(!h[qId])h[qId]={c:0,w:0,last:0,streak:0};if(ok){h[qId].c++;h[qId].streak++;}else{h[qId].w++;h[qId].streak=0;}h[qId].last=Date.now();saveHistory(h);}
function getWeakQuestions(pool){const h=getHistory();return pool.filter(q=>{const s=h[q.id];if(!s)return true;return s.w>s.c||s.streak<2;}).sort((a,b)=>{const sa=h[a.id]||{c:0,w:0,last:0};const sb=h[b.id]||{c:0,w:0,last:0};return(sb.w-sb.c)-(sa.w-sa.c)||(sa.last-sb.last);});}
function getStatsOverview(){const h=getHistory();let ans=0,cc=0,wc=0,mast=0;for(const id in h){ans++;cc+=h[id].c;wc+=h[id].w;if(h[id].streak>=3)mast++;}return{total:Q.length,answered:ans,unanswered:Q.length-ans,cc,wc,mastered:mast,acc:(cc+wc)>0?Math.round(cc/(cc+wc)*100):0};}
function getTopicStats(){const h=getHistory();const tm={};Q.forEach(q=>{const t=q.topic;if(!tm[t])tm[t]={total:0,ans:0,c:0,w:0,m:0};tm[t].total++;const s=h[q.id];if(s){tm[t].ans++;tm[t].c+=s.c;tm[t].w+=s.w;if(s.streak>=3)tm[t].m++;}});return tm;}
function resetAllStats(){if(confirm('Alle Lernstatistiken für '+activeUser+' wirklich löschen?')){const users=loadUsers();if(users[activeUser])users[activeUser].history={};saveUsers(users);render();}}

function getFilteredPool(){
  let pool=[...Q];
  if(state.selTopics.size>0) pool=pool.filter(q=>state.selTopics.has(q.topic));
  if(state.selTypes.size>0) pool=pool.filter(q=>state.selTypes.has(q.type));
  return pool;
}

function render(){
  if(state.mode==="login"){ renderLogin(); return; }
  if(state.mode==="stats"){ renderStats(); return; }

window.createUser=function(){

  if(!name){alert('Bitte einen Namen eingeben.');return;}
  const users=loadUsers();
  if(users[name]){alert('Dieser Name existiert bereits.');return;}
  users[name]={history:{}};

window.deleteUser=function(name){
  if(!confirm('Benutzer "'+name+'" und alle Lernstatistiken löschen?'))return;
  const users=loadUsers();
  delete users[name];

};

function renderQuiz(){
  const q=state.questions[state.idx];
  if(!q)return;
  const progress=((state.idx+1)/state.questions.length)*100;
  const correct=state.results.filter(r=>r.ok).length;
  const total=state.results.length;
  const pct=total>0?Math.round(correct/total*100):0;
  const lastResult=state.results[state.results.length-1];

  let typeLabel,typeBadge;
  if(q.type==="ordering"){ typeLabel="Reihenfolge ("+q.answer.length+")"; typeBadge="badge-ordering"; }
  else if(q.type==="matching"){ typeLabel="Zuordnung"; typeBadge="badge-matching"; }
  else if(q.type==="multi"){ typeLabel="Mehrfachauswahl ("+q.answer.length+")"; typeBadge="badge-multi"; }
  else { typeLabel="Einzelauswahl"; typeBadge="badge-single"; }

  let timerHtml='';
  if(state.mode==="exam"&&state.timeLeft>0){
    const m=Math.floor(state.timeLeft/60);
    const s=state.timeLeft%60;
    const warn=state.timeLeft<600;
    timerHtml=`<span class="timer ${warn?'warning':''}">⏱ ${m}:${String(s).padStart(2,'0')}</span>`;
  }

  let bodyHtml='';
  if(q.type==="ordering") bodyHtml=renderOrdering(q);
  else if(q.type==="matching") bodyHtml=renderMatching(q);
  else bodyHtml=renderOptions(q);

  app.innerHTML=`
    <div class="topbar">
      <button class="topbar-quit" onclick="if(confirm('Quiz beenden?'))resetToMenu()">✕ Beenden</button>
      <div style="display:flex;align-items:center;gap:12px">
        ${timerHtml}
        <span style="color:var(--text3)">${state.idx+1} / ${state.questions.length}</span>
        ${total>0?`<span class="topbar-score ${pct>=70?'good':'mid'}">${correct}/${total} (${pct}%)</span>`:''}
      </div>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap" class="mb-3">
      <span class="badge badge-topic">${q.topic} · ${TL[q.topic]||''}</span>
      <span class="badge ${typeBadge}">${typeLabel}</span>
    </div>
    ${getCaseStudyHtml(q)}
    <h2 style="font-size:17px;font-weight:500;line-height:1.6;margin-bottom:20px;color:#f4f4f5">${q.text}</h2>
    <div class="mb-6">${bodyHtml}</div>
    ${state.answered&&state.showExplain&&state.mode==="practice"?`
      <div class="explain ${lastResult&&lastResult.ok?'pass':'fail'}">
        <div class="explain-header">${lastResult&&lastResult.ok?'✅ Richtig!':'❌ Leider falsch'}</div>
        <div class="explain-body">${q.explain}</div>
      </div>`:''}
    ${!state.answered?
      `<button class="btn btn-primary btn-full" ${canCheck(q)?'':'disabled'} onclick="checkAnswer()">Antwort prüfen</button>`:
      `<button class="btn btn-primary btn-full" onclick="nextQ()">${state.idx<state.questions.length-1?'Nächste Frage →':'Ergebnis anzeigen 👍'}</button>`}`;
}

function canCheck(q){
  if(q.type==="ordering") return state.ordering.length>0;
  if(q.type==="matching"){
    return state.matchSel&&state.matchSel.length>0&&state.matchSel.every(s=>s!=='');
  }
  return state.sel.size>0;
}

function renderOptions(q){
  const atMax = q.type==='multi' && !state.answered && state.sel.size>=q.answer.length;
  return q.options.map(o=>{
    const isSel=state.sel.has(o.l);
    const isCorr=q.answer.includes(o.l);
    let cls='option';
    if(state.answered){
      cls+=' locked';
      if(isCorr) cls+=' correct';
      else if(isSel&&!isCorr) cls+=' wrong';
      else cls+=' dimmed';
    }else if(isSel) cls+=' selected';
    else if(atMax) cls+=' dimmed';
    return `<button class="${cls}" data-opt="${o.l}">
      <span class="option-letter">${o.l}</span>
      <span class="option-text">${o.t}</span>
    </button>`;
  }).join('');
}

function renderOrdering(q){
  const items=state.ordering.length>0?state.ordering:q.options.map(o=>o.l);
  if(state.ordering.length===0) state.ordering=[...items];
  const hasDistractors = q.answer.length < q.options.length;
  const ansLen = q.answer.length;
  
  let html = '';
  // Hint for questions with distractors
  if(hasDistractors && !state.answered){
    html += `<div style="font-size:12px;color:var(--amber);margin-bottom:10px;padding:8px 12px;border:1px solid var(--amber-border);border-radius:8px;background:var(--amber-dim)">💡 Sortiere die ${ansLen} richtigen Schritte nach oben. Nicht benötigte Schritte gehören ans Ende.</div>`;
  }
  
  html += items.map((lbl,i)=>{
    const opt=q.options.find(o=>o.l===lbl);
    const isInAnswer = q.answer.includes(lbl);
    const correctPos = q.answer.indexOf(lbl); // -1 for distractors
    let cls='ordering-item';
    let feedback = '';
    
    if(state.answered){
      cls+=' locked';
      if(hasDistractors){
        if(isInAnswer && i < ansLen && q.answer[i] === lbl){
          // Correct item at correct position in top N
          cls += ' correct';
          feedback = '✓ Richtig';
        } else if(!isInAnswer && i >= ansLen){
          // Distractor correctly placed at bottom
          cls += ' correct';
          feedback = '✓ Nicht benötigt';
        } else if(isInAnswer){
          // Item belongs in answer but is at wrong position
          cls += ' wrong';
          feedback = '✗ Pos. ' + (correctPos + 1);
        } else {
          // Distractor in top area – shouldn't be here
          cls += ' wrong';
          feedback = '✗ Nicht benötigt';
        }
      } else {
        cls += correctPos===i?' correct':' wrong';
        feedback = correctPos===i ? '✓ Richtig' : '✗ Pos. '+(correctPos+1);
      }
    }
    
    // Visual separator between answer zone and distractor zone
    let separator = '';
    if(hasDistractors && i === ansLen && !state.answered){
      separator = `<div style="border-top:1px dashed var(--border);margin:6px 0;padding-top:6px;font-size:11px;color:var(--text3);text-align:center">── nicht benötigt ──</div>`;
    }
    
    return separator + `<div class="${cls}" data-order="${lbl}" draggable="${!state.answered}">
      ${!state.answered?`<div class="ordering-arrows">
        <button onclick="moveItem(${i},-1)" ${i===0?'disabled':''}>▲</button>
        <button onclick="moveItem(${i},1)" ${i===items.length-1?'disabled':''}>▼</button>
      </div>`:''}
      <span class="ordering-num">${i+1}</span>
      <span class="ordering-text">${opt?opt.t:''}</span>
      ${!state.answered?'<span class="drag-handle">⠿</span>':''}
      ${state.answered?`<span style="font-size:11px;color:${feedback.startsWith('✓')?'var(--green)':'var(--red)'};margin-left:auto;white-space:nowrap">${feedback}</span>`:''}
    </div>`;
  }).join('');
  return html;
}

function renderMatching(q){
  const ARROW=' \u2192 ';
  
  // Create stable shuffled order for dropdown (once per question)
  if(!state.matchShuffled || state.matchShuffled.length !== q.options.length){
    state.matchShuffled = q.options.map((_,i)=>i);
    for(let i=state.matchShuffled.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [state.matchShuffled[i],state.matchShuffled[j]]=[state.matchShuffled[j],state.matchShuffled[i]];
    }
  }
  const shuffledOpts = state.matchShuffled.map(i=>q.options[i]);

  // Auto-generate stems from arrow-separated options when no stems defined
  if(!q.stems||q.stems.length===0){
    const parsed=q.options.map(o=>{
      const idx=o.t.indexOf(ARROW.trim());
      if(idx>0) return {l:o.l, term:o.t.substring(0,idx).trim(), def:o.t.substring(idx+ARROW.trim().length).trim()};
      return {l:o.l, term:o.t, def:o.t};
    });
    const parsedShuffled = state.matchShuffled.map(i=>parsed[i]);
    if(!state.matchSel) state.matchSel=new Array(parsed.length).fill('');
    let html='<div style="display:flex;flex-direction:column;gap:14px">';
    parsed.forEach((p,i)=>{
      let borderCol='var(--border)';
      if(state.answered){
        borderCol=state.matchSel[i]===q.answer[i]?'var(--green)':'var(--red)';
      }
      html+=`<div style="border:1px solid ${borderCol};border-radius:10px;padding:14px;background:var(--card)">
        <div style="font-size:14px;color:var(--text2);margin-bottom:8px;line-height:1.5"><strong>${p.l}.</strong> ${p.term}</div>
        <select onchange="state.matchSel[${i}]=this.value;render()" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text1);font-size:14px" ${state.answered?'disabled':''}>
          <option value="">-- Zuordnung auswählen --</option>
          ${parsedShuffled.map(d=>`<option value="${d.l}" ${state.matchSel[i]===d.l?'selected':''}>${d.def}</option>`).join('')}
        </select>`;
      if(state.answered){
        if(state.matchSel[i]===q.answer[i]){
          html+=`<div style="color:var(--green);font-size:12px;margin-top:4px">\u2713 Richtig</div>`;
        } else {
          const correctDef=parsed.find(d=>d.l===q.answer[i]);
          html+=`<div style="color:var(--red);font-size:12px;margin-top:4px">\u2717 Richtig w\u00e4re: ${correctDef?correctDef.def:q.answer[i]}</div>`;
        }
      }
      html+=`</div>`;
    });
    html+='</div>';
    return html;
  }
  if(!state.matchSel) state.matchSel=new Array(q.stems.length).fill('');
  let html='<div style="display:flex;flex-direction:column;gap:14px">';
  q.stems.forEach((stem,i)=>{
    let borderCol='var(--border)';
    if(state.answered){
      borderCol=state.matchSel[i]===q.answer[i]?'var(--green)':'var(--red)';
    }
    html+=`<div style="border:1px solid ${borderCol};border-radius:10px;padding:14px;background:var(--card)">
      <div style="font-size:14px;color:var(--text2);margin-bottom:8px;line-height:1.5"><strong>${i+1}.</strong> ${stem}</div>
      <select onchange="state.matchSel[${i}]=this.value;render()" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text1);font-size:14px" ${state.answered?'disabled':''}>
        <option value="">-- Auswählen --</option>
        ${shuffledOpts.map(o=>`<option value="${o.l}" ${state.matchSel[i]===o.l?'selected':''}>${o.l}. ${o.t}</option>`).join('')}
      </select>`;
    if(state.answered){
      if(state.matchSel[i]===q.answer[i]){
        html+=`<div style="color:var(--green);font-size:12px;margin-top:4px">✓ Richtig</div>`;
      } else {
        const correctOpt=q.options.find(o=>o.l===q.answer[i]);
        html+=`<div style="color:var(--red);font-size:12px;margin-top:4px">✗ Richtig wäre: ${q.answer[i]}${correctOpt?'. '+correctOpt.t:''}</div>`;
      }
    }
    html+=`</div>`;
  });
  html+='</div>';
  return html;
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
window.toggleTopic=function(t){state.selTopics.has(t)?state.selTopics.delete(t):state.selTopics.add(t);render();};
window.clearTopics=function(){state.selTopics.clear();state.selTypes.clear();render();};
window.toggleType=function(t){state.selTypes.has(t)?state.selTypes.delete(t):state.selTypes.add(t);render();};


window.startWeak=function(){
  let pool=[...Q];
  if(state.selTopics.size>0) pool=pool.filter(q=>state.selTopics.has(q.topic));
  if(state.selTypes.size>0) pool=pool.filter(q=>state.selTypes.has(q.type));
  const weak=getWeakQuestions(pool);
  if(weak.length===0){alert('Keine schwachen Fragen gefunden! Alle Fragen wurden mindestens 2x richtig beantwortet.');return;}
  const count=Math.min(state.qCount,weak.length);
  state.questions=weak.slice(0,count);
  state.mode='practice';state.idx=0;state.sel=new Set();state.ordering=[];state.matchSel=null;state.matchShuffled=null;state.answered=false;state.results=[];
  render();window.scrollTo(0,0);
};

window.startSmart=function(mode){
  const hist=getHistory();
  let selected=[];
  if(mode==='new'){
    selected=Q.filter(q=>!hist[q.id]);
  } else if(mode==='errors'){
    selected=Q.filter(q=>hist[q.id]&&hist[q.id].w>0).sort((a,b)=>{
      const ra=hist[a.id].w/(hist[a.id].c+hist[a.id].w);
      const rb=hist[b.id].w/(hist[b.id].c+hist[b.id].w);
      return rb-ra;
    });
  } else if(mode==='least'){
    selected=Q.filter(q=>!hist[q.id]||((hist[q.id].c+hist[q.id].w)<2));
  } else if(mode==='weakTopic'){
    const topicAcc={};
    Q.forEach(q=>{
      if(!topicAcc[q.topic])topicAcc[q.topic]={ok:0,total:0};
      const h=hist[q.id];
      if(h){topicAcc[q.topic].ok+=h.c;topicAcc[q.topic].total+=h.c+h.w;}
    });
    let weakest='';let weakPct=101;
    for(const t in topicAcc){
      if(topicAcc[t].total>0){
        const pct=Math.round(topicAcc[t].ok/topicAcc[t].total*100);
        if(pct<weakPct){weakPct=pct;weakest=t;}
      }
    }
    if(weakest) selected=Q.filter(q=>q.topic===weakest);
  }
  if(selected.length===0){alert('Keine passenden Fragen gefunden.');return;}
  if(state.shuffle) selected.sort(()=>Math.random()-.5);
  const count=Math.min(state.qCount,selected.length);
  state.questions=selected.slice(0,count);
  state.mode='practice';state.idx=0;state.sel=new Set();state.ordering=[];state.matchSel=null;state.matchShuffled=null;state.answered=false;state.results=[];
  render();window.scrollTo(0,0);
};

function renderStats(){

  const pctDone=ov.total>0?Math.round(ov.answered/ov.total*100):0;

  let topicHtml='';
  for(const t in ts){
    const s=ts[t];
    const tAcc=(s.c+s.w)>0?Math.round(s.c/(s.c+s.w)*100):0;
    const tPct=s.total>0?Math.round(s.ans/s.total*100):0;
    const barCol=tAcc>=80?'var(--green)':tAcc>=50?'var(--amber)':'var(--red)';
    topicHtml+=`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span style="color:var(--text2)">${t} · ${TL[t]||''}</span>
        <span style="color:var(--text3)">${s.m}/${s.total} gemeistert · ${tAcc}%</span>
      </div>
      <div style="height:6px;background:var(--surface2);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${tPct}%;background:${barCol};border-radius:99px"></div>
      </div>
    </div>`;
  }
  
  app.innerHTML=`
    <div style="max-width:700px;margin:0 auto;padding:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h1 style="font-size:22px;font-weight:700;color:var(--text1)">📊 Lernfortschritt – ${activeUser}</h1>
        <button class="btn btn-secondary" style="padding:8px 16px;font-size:13px" onclick="state.mode='menu';render()">← Zurück</button>
      </div>
      
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:var(--amber)">${ov.answered}</div>
          <div style="font-size:12px;color:var(--text3)">Bearbeitet</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:var(--green)">${ov.mastered}</div>
          <div style="font-size:12px;color:var(--text3)">Gemeistert</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:${ov.acc>=70?'var(--green)':'var(--red)'}">${ov.acc}%</div>
          <div style="font-size:12px;color:var(--text3)">Genauigkeit</div>
        </div>
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:var(--text3)">${ov.unanswered}</div>
          <div style="font-size:12px;color:var(--text3)">Offen</div>
        </div>
      </div>
      
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:600;color:var(--text1);margin-bottom:4px">Gesamtfortschritt</div>
        <div style="height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;width:${pctMast}%;background:var(--green);border-radius:99px"></div>
        </div>
        <div style="font-size:12px;color:var(--text3)">${pctMast}% gemeistert (3x richtig in Folge) · ${pctDone}% mindestens 1x bearbeitet</div>
      </div>

      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
        <div style="font-size:14px;font-weight:600;color:var(--text1);margin-bottom:12px">Nach Themen</div>
        ${topicHtml}
      </div>
      
      <div style="display:flex;gap:12px">
        <button class="btn btn-primary" style="flex:1;padding:12px" onclick="startWeak()">🔄 Schwächen üben</button>
        <button class="btn btn-secondary" style="padding:12px;font-size:13px;color:var(--red)" onclick="resetAllStats()">🗑 Statistik löschen</button>
      </div>
    </div>`;
}

window.startQuiz=function(mode){
  let pool=getFilteredPool();
  if(pool.length===0){alert('Keine Fragen mit diesen Filtern verfügbar.');return;}
  if(state.shuffle) pool.sort(()=>Math.random()-.5);
  const count=mode==="exam"?Math.min(50,pool.length):Math.min(state.qCount,pool.length);
  state.questions=pool.slice(0,count);
  state.idx=0;state.sel=new Set();state.ordering=[];state.answered=false;state.results=[];state.mode=mode;state.reviewIdx=-1;
  if(mode==="exam"){
    state.timeLeft=6000;
    if(state.timer) clearInterval(state.timer);
    state.timer=setInterval(()=>{
      state.timeLeft--;
      if(state.timeLeft<=0){clearInterval(state.timer);state.mode="review";render();}
      else render();
    },1000);
  }
  render();window.scrollTo(0,0);
};

window.toggleOpt=function(l){
  const q=state.questions[state.idx];
  if(q.type==="multi"){
    if(state.sel.has(l)){state.sel.delete(l);}
    else if(state.sel.size<q.answer.length){state.sel.add(l);}
    // If already at max, ignore new selection (user must deselect first)
  }
  else{state.sel.clear();state.sel.add(l);}
  render();
};

window.moveItem=function(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=state.ordering.length)return;
  [state.ordering[idx],state.ordering[newIdx]]=[state.ordering[newIdx],state.ordering[idx]];
  render();
};

window.checkAnswer=function(){
  const q=state.questions[state.idx];
  let user,correct,ok;
  if(q.type==="ordering"){
    correct=[...q.answer];
    // Support distractor items: only compare the first N positions (N = answer length)
    if(q.answer.length < q.options.length){
      user=[...state.ordering].slice(0, q.answer.length);
    } else {
      user=[...state.ordering];
    }
    ok=user.join()===correct.join();
  } else if(q.type==="matching"){
    user=[...(state.matchSel||[])];
    correct=[...q.answer];
    ok=user.join()===correct.join();
  } else {
    if(state.sel.size===0)return;
    user=[...state.sel].sort();
    correct=[...q.answer].sort();
    ok=user.join()===correct.join();
  }
  state.results.push({ok,user,correct});
  recordAnswer(q.id,ok);
  state.answered=true;
  render();
};

window.nextQ=function(){
  if(state.idx<state.questions.length-1){
    state.idx++;state.sel=new Set();state.ordering=[];state.matchSel=null;state.matchShuffled=null;state.answered=false;
    render();window.scrollTo(0,0);
  }else{
    if(state.timer) clearInterval(state.timer);
    state.mode="review";render();window.scrollTo(0,0);
  }
};

window.resetToMenu=function(){
  if(state.timer) clearInterval(state.timer);
  state.mode="menu";state.questions=[];state.results=[];state.idx=0;state.sel=new Set();state.ordering=[];state.matchSel=null;state.matchShuffled=null;state.answered=false;state.reviewIdx=-1;
  render();window.scrollTo(0,0);
};

// ─── DRAG & DROP ───────────────────────────────────────────────────────────
let dragSrcIdx=null;
app.addEventListener('dragstart',function(e){
  const item=e.target.closest('[data-order]');
  if(!item||state.answered)return;
  dragSrcIdx=state.ordering.indexOf(item.dataset.order);
  item.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
});
app.addEventListener('dragover',function(e){
  e.preventDefault();
  const item=e.target.closest('[data-order]');
  if(item) item.classList.add('drag-over');
});
app.addEventListener('dragleave',function(e){
  const item=e.target.closest('[data-order]');
  if(item) item.classList.remove('drag-over');
});
app.addEventListener('drop',function(e){
  e.preventDefault();
  const item=e.target.closest('[data-order]');
  if(!item||dragSrcIdx===null)return;
  const dropIdx=state.ordering.indexOf(item.dataset.order);
  [state.ordering[dragSrcIdx],state.ordering[dropIdx]]=[state.ordering[dropIdx],state.ordering[dragSrcIdx]];
  dragSrcIdx=null;
  render();
});
app.addEventListener('dragend',function(){dragSrcIdx=null;});

// ─── CLICK HANDLER ─────────────────────────────────────────────────────────
app.addEventListener('click',function(e){
  const btn=e.target.closest('[data-opt]');
  if(btn&&!state.answered) toggleOpt(btn.dataset.opt);
});

// ─── SHUFFLE ORDERING ON QUESTION LOAD ─────────────────────────────────────
// ——— SHUFFLE ORDERING ON QUESTION LOAD ———————————————————————————————
const origRender=render;
render=function(){
  const q=state.questions[state.idx];
  if(q&&q.type==="ordering"&&state.ordering.length===0&&!state.answered){
    state.ordering=[...q.options.map(o=>o.l)].sort(()=>Math.random()-.5);
  }
  origRender();
};

render();
</script>
